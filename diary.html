<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voce Viva - Diario</title>
<meta name="theme-color" content="#0a0a0f">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=EB+Garamond:ital,wght@1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="vv-profile.js"></script>
<script src="rnnoise-sync.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0a0a0f; --surface:#111118; --border:#1e1e2e; --accent:#f55036; --text:#e8e8f0; --muted:#5a5a7a; --live:#4ade80; }
body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem 3rem; -webkit-tap-highlight-color:transparent; }
body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background:radial-gradient(ellipse 80% 50% at 5% 95%,rgba(245,80,54,.08) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 95% 5%,rgba(245,80,54,.05) 0%,transparent 60%); }
.container { position:relative; z-index:1; width:100%; max-width:640px; display:flex; flex-direction:column; gap:1.1rem; }
.mode-switcher { display:flex; gap:.4rem; background:var(--surface); border:1px solid var(--border); border-radius:.8rem; padding:.35rem; }
.mode-btn { flex:1; background:none; border:none; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:.65rem; text-transform:uppercase; letter-spacing:.12em; padding:.5rem; border-radius:.5rem; cursor:pointer; touch-action:manipulation; transition:background .2s,color .2s; text-decoration:none; display:flex; align-items:center; justify-content:center; }
.mode-btn.active { background:var(--accent); color:#fff; }
.header-row { display:flex; justify-content:space-between; align-items:flex-start; }
h1 { font-family:'DM Serif Display',serif; font-size:clamp(1.6rem,5vw,2.2rem); letter-spacing:-.03em; line-height:1; }
h1 em { font-style:italic; color:var(--accent); }
.subtitle { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.18em; margin-top:.4rem; }
.view-switcher { display:inline-flex; gap:.3rem; background:var(--surface); border:1px solid var(--border); border-radius:.6rem; padding:.25rem; }
.view-btn { background:none; border:none; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:.58rem; text-transform:uppercase; letter-spacing:.1em; padding:.35rem .65rem; border-radius:.4rem; cursor:pointer; touch-action:manipulation; transition:background .2s,color .2s; white-space:nowrap; }
.view-btn.active { background:var(--accent); color:#fff; }
/* Calendar */
.cal-nav { display:flex; justify-content:space-between; align-items:center; padding:.5rem 0; }
.cal-nav-btn { background:none; border:1px solid var(--border); color:var(--muted); width:32px; height:32px; border-radius:.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.8rem; transition:border-color .2s,color .2s; }
.cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
.cal-month { font-family:'DM Serif Display',serif; font-size:1.1rem; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-header { font-size:.55rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); text-align:center; padding:.4rem 0; }
.cal-day { position:relative; aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:.5rem; font-size:.72rem; cursor:default; transition:background .15s; }
.cal-day.other { color:var(--border); }
.cal-day.today { background:rgba(245,80,54,.1); color:var(--accent); font-weight:500; }
.cal-day.has-notes { cursor:pointer; }
.cal-day.has-notes:hover { background:rgba(245,80,54,.15); }
.cal-day.selected { background:rgba(245,80,54,.25); }
.cal-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); position:absolute; bottom:4px; }
.cal-day .add-btn { display:none; position:absolute; top:2px; right:2px; width:14px; height:14px; background:var(--accent); border:none; border-radius:50%; color:#fff; font-size:.65rem; line-height:1; cursor:pointer; align-items:center; justify-content:center; padding:0; }
.cal-day:hover .add-btn, .cal-day.today .add-btn { display:flex; }
.cal-day.other .add-btn { display:none !important; }
/* Day panel */
.day-panel { display:flex; flex-direction:column; gap:.6rem; margin-top:.4rem; }
.day-panel-header { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; padding:.3rem 0; border-bottom:1px solid var(--border); }
.read-card { background:var(--surface); border:1px solid var(--border); border-radius:.8rem; padding:1rem; }
.read-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.75rem; gap:.5rem; }
.read-card-title { font-family:'DM Serif Display',serif; font-size:1rem; color:var(--text); flex:1; }
.read-card-close { background:none; border:none; color:var(--muted); font-size:1rem; cursor:pointer; padding:.1rem .3rem; line-height:1; flex-shrink:0; }
.read-card-close:hover { color:var(--accent); }
.read-card-body { font-size:.82rem; line-height:1.85; color:var(--text); }
.read-card-body p { margin-bottom:.55rem; }
.read-card-body h3 { font-family:'DM Serif Display',serif; font-size:1rem; margin:.7rem 0 .3rem; }
.read-card-footer { margin-top:.85rem; display:flex; justify-content:flex-end; gap:.4rem; }
.btn-edit { background:none; border:1px solid var(--border); color:var(--muted); padding:.38rem .8rem; border-radius:.5rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; transition:border-color .2s,color .2s; }
.btn-edit:hover { border-color:var(--accent); color:var(--accent); }
.btn-delete-card { background:none; border:1px solid rgba(240,106,106,.3); color:#f06a6a; padding:.38rem .8rem; border-radius:.5rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; transition:border-color .2s,background .2s; }
.btn-delete-card:hover { background:rgba(240,106,106,.1); }
/* Cronologia */
.notes-section { display:flex; flex-direction:column; gap:.6rem; }
.week-header { font-size:.58rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); padding:.5rem 0 .2rem; border-bottom:1px solid var(--border); }
.note-card { background:var(--surface); border:1px solid var(--border); border-radius:.8rem; padding:.85rem; cursor:pointer; transition:border-color .2s; display:flex; justify-content:space-between; align-items:center; gap:.5rem; }
.note-card:hover { border-color:rgba(245,80,54,.4); }
.note-card-main { flex:1; min-width:0; display:flex; flex-direction:column; gap:.2rem; }
.note-title { font-family:'DM Serif Display',serif; font-size:.88rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.note-meta { display:flex; gap:.4rem; align-items:center; }
.note-date { font-size:.58rem; color:var(--muted); white-space:nowrap; }
.note-tags { display:flex; gap:.25rem; }
.note-tag { font-size:.5rem; text-transform:uppercase; letter-spacing:.08em; padding:.1rem .35rem; border-radius:.25rem; background:rgba(245,80,54,.12); color:var(--accent); border:1px solid rgba(245,80,54,.25); }
.note-tag.tag-write { background:rgba(74,222,128,.08); color:var(--live); border-color:rgba(74,222,128,.2); }
.note-tag.tag-ai { background:rgba(147,112,219,.1); color:#a78bfa; border-color:rgba(147,112,219,.2); }
.note-tag.tag-photo { background:rgba(56,189,248,.08); color:#38bdf8; border-color:rgba(56,189,248,.2); }
.note-card-actions { display:flex; gap:.3rem; flex-shrink:0; }
.note-card-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:.3rem .6rem; border-radius:.4rem; font-family:'JetBrains Mono',monospace; font-size:.58rem; cursor:pointer; touch-action:manipulation; transition:border-color .2s,color .2s; white-space:nowrap; }
.note-card-btn:hover { border-color:var(--accent); color:var(--accent); }
.note-card-btn.del { border-color:rgba(240,106,106,.3); color:#f06a6a; }
.note-card-btn.del:hover { background:rgba(240,106,106,.08); }
.list-add-row { display:flex; justify-content:flex-end; padding:.2rem 0 .4rem; }
.btn-add-list { background:var(--accent); border:none; color:#fff; width:32px; height:32px; border-radius:50%; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; box-shadow:0 4px 16px rgba(245,80,54,.35); }
/* Loading/error */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:.72rem; line-height:2; }
.loading-state { text-align:center; padding:2rem; }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes modalIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{box-shadow:0 3px 18px rgba(192,57,43,.55)} 50%{box-shadow:0 3px 28px rgba(192,57,43,.85),0 0 0 6px rgba(192,57,43,.1)} }
.error-msg { background:rgba(240,106,106,.08); border:1px solid rgba(240,106,106,.25); border-radius:.6rem; padding:.65rem .85rem; font-size:.68rem; color:#f06a6a; line-height:1.6; display:none; }
.error-msg.show { display:block; }
/* Read overlay */
.read-overlay { display:none; position:fixed; inset:0; z-index:80; background:var(--bg); flex-direction:column; }
.read-overlay.show { display:flex; animation:slideUp .25s ease-out; }
.read-overlay-header { display:flex; justify-content:space-between; align-items:center; padding:1.1rem 1.2rem .8rem; border-bottom:1px solid var(--border); flex-shrink:0; }
.read-overlay-title { font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--text); flex:1; margin-right:.5rem; }
.read-overlay-close { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:.1rem .3rem; line-height:1; }
.read-overlay-body { flex:1; overflow-y:auto; padding:1.2rem; font-size:.85rem; line-height:1.9; color:var(--text); }
.read-overlay-body p { margin-bottom:.65rem; }
.read-overlay-body h3 { font-family:'DM Serif Display',serif; font-size:1.05rem; margin:.8rem 0 .35rem; }
.read-overlay-footer { padding:1rem 1.2rem; border-top:1px solid var(--border); display:flex; gap:.5rem; justify-content:flex-end; flex-shrink:0; }
/* Edit modal */
.modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); align-items:flex-start; justify-content:center; padding:1rem; overflow-y:auto; }
.modal-overlay.show { display:flex; }
.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:1.2rem; padding:1.5rem; width:100%; max-width:600px; display:flex; flex-direction:column; gap:1rem; animation:modalIn .2s ease-out; margin:auto; }
.modal-title { font-family:'DM Serif Display',serif; font-size:1.2rem; color:var(--text); display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; padding:.1rem .3rem; }
.modal-field { display:flex; flex-direction:column; gap:.3rem; }
.modal-label { font-size:.58rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }
.modal-input { background:var(--bg); border:1px solid var(--border); border-radius:.6rem; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:.78rem; padding:.55rem .7rem; outline:none; transition:border-color .2s; width:100%; }
.modal-input:focus { border-color:var(--accent); }
.modal-content-edit { background:var(--bg); border:1px solid var(--border); border-radius:.6rem; color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:1rem; line-height:1.85; padding:.75rem; outline:none; min-height:55vh; width:100%; overflow-y:auto; caret-color:var(--accent); }
.modal-content-edit:focus { border-color:var(--accent); }
.modal-content-edit p { margin-bottom:.55rem; }
.modal-content-edit h1 { font-family:'Crimson Pro',Georgia,serif; font-size:1.7em; font-weight:500; color:#fff; border-bottom:1px solid var(--border); padding-bottom:.3em; margin:.1em 0 .5em; }
.modal-content-edit h2 { font-family:'Crimson Pro',Georgia,serif; font-size:1.35em; font-weight:500; color:#ddd; margin:.9em 0 .4em; }
.modal-content-edit h3 { font-family:'Crimson Pro',Georgia,serif; font-size:1.1em; font-weight:500; color:#bbb; margin:.8em 0 .3em; }
.modal-content-edit strong { color:#fff; font-weight:600; }
.modal-content-edit em { color:#fff; font-style:italic; font-family:"EB Garamond",Georgia,serif; }
.modal-content-edit ul, .modal-content-edit ol { margin:.3em 0 .3em 1.5em; padding:0; }
.modal-content-edit li { margin:.15em 0; }
.modal-actions { display:flex; gap:.2rem; align-items:center; width:100%; flex-wrap:nowrap; }
.modal-btn { padding:.5rem 0; border-radius:.6rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; cursor:pointer; touch-action:manipulation; border:none; flex:1; text-align:center; white-space:nowrap; }
.modal-btn-delete { background:none; border:1px solid rgba(240,106,106,.4); color:#f06a6a; }
.modal-btn-cancel { background:none; border:1px solid var(--border); color:var(--muted); }
.modal-btn-copy { background:none; border:1px solid var(--border); color:var(--muted); }
.modal-btn-confirm { background:var(--live); color:#0a0a0f; font-weight:500; }
.modal-btn-confirm:disabled { opacity:.4; cursor:not-allowed; }
.modal-spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(10,10,15,.2); border-top-color:#0a0a0f; border-radius:50%; animation:spin .6s linear infinite; margin-right:.3rem; vertical-align:middle; }
/* ── ANNOT POPUP — più grande, con sezione AI ── */
.annot-popup { display:none; position:fixed; inset:0; z-index:90; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); align-items:flex-end; justify-content:center; }
.annot-popup.show { display:flex; }
.annot-popup-card { background:var(--surface); border:1px solid var(--border); border-top-left-radius:1.4rem; border-top-right-radius:1.4rem; width:100%; max-width:640px; display:flex; flex-direction:column; gap:.8rem; padding:1.3rem 1.3rem 1.6rem; animation:slideUp .25s ease-out; max-height:94vh; overflow-y:auto; }
.annot-popup-header { display:flex; justify-content:space-between; align-items:flex-start; }
.annot-popup-title-input { font-family:'DM Serif Display',serif; font-size:1.05rem; color:var(--text); background:none; border:none; border-bottom:1px solid var(--border); outline:none; width:100%; padding:.15rem 0; transition:border-color .2s; }
.annot-popup-title-input:focus { border-color:var(--accent); }

.annot-popup-editor:focus { border-color:var(--accent); }
.annot-popup-editor:empty::before { content:attr(data-placeholder); color:var(--muted); pointer-events:none; display:block; font-family:'JetBrains Mono',monospace; font-size:.8rem; }
.annot-popup-editor p { margin-bottom:.4rem; }
.annot-popup-editor h1 { font-family:'Crimson Pro',Georgia,serif; font-size:1.7em; font-weight:500; color:#ffffff; line-height:1.3; margin:.1em 0 .5em; border-bottom:1px solid var(--border); padding-bottom:.3em; }
.annot-popup-editor h2 { font-family:'Crimson Pro',Georgia,serif; font-size:1.35em; font-weight:500; color:#dddddd; line-height:1.35; margin:.9em 0 .4em; }

.annot-popup-editor em { color:#ffffff; font-style:italic; font-family:"EB Garamond",Georgia,serif; }
.annot-popup-editor ul, .annot-popup-editor ol { margin:.3em 0 .3em 1.5em; padding:0; }
.annot-popup-editor li { margin:.15em 0; }
/* Formatting toolbar */
.fmt-toolbar { display:flex; align-items:center; gap:.2rem; justify-content:space-between; width:100%; flex-wrap:nowrap; }
.fmt-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:.3rem 0; border-radius:.4rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; cursor:pointer; touch-action:manipulation; transition:all .12s; white-space:nowrap; line-height:1.4; user-select:none; -webkit-user-select:none; text-transform:uppercase; letter-spacing:.04em; flex:1; text-align:center; }
.fmt-btn.active { background:rgba(245,80,54,.15); color:var(--accent); border-color:rgba(245,80,54,.45); }
.fmt-btn:hover:not(.active) { background:var(--surface); color:var(--text); border-color:var(--border); }
.fmt-sep { width:1px; height:16px; background:var(--border); margin:0 4px; flex-shrink:0; }
/* AI section in popup */

.popup-ai-output p { margin-bottom:.5rem; }
.popup-ai-output h3 { font-family:'DM Serif Display',serif; font-size:.95rem; margin:.6rem 0 .25rem; }
.popup-mood { font-size:.75rem; color:var(--muted); font-style:italic; padding:.4rem 0 0; display:none; }
.popup-mood.show { display:block; }

.annot-popup-actions { display:flex; gap:.2rem; align-items:center; width:100%; flex-wrap:nowrap; }
.popup-footer { display:flex; flex-direction:column; gap:.5rem; width:100%; margin-top:.5rem; }
.popup-row-words { display:flex; align-items:center; gap:.5rem; }
.popup-row-mic { display:flex; justify-content:center; width:100%; padding-top:.25rem; }
.mic-btn-sm { width:36px; height:36px; border-radius:50%; border:none; background:var(--accent); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .12s; touch-action:manipulation; box-shadow:0 3px 12px rgba(245,80,54,.35); flex-shrink:0; }

.photo-proc-pill.show { display:flex; }

.note-card-actions { display:flex; gap:.3rem; flex-shrink:0; }
.note-card-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:.3rem .6rem; border-radius:.4rem; font-family:'JetBrains Mono',monospace; font-size:.58rem; cursor:pointer; touch-action:manipulation; transition:border-color .2s,color .2s; white-space:nowrap; }
.note-card-btn:hover { border-color:var(--accent); color:var(--accent); }
.note-card-btn.del { border-color:rgba(240,106,106,.3); color:#f06a6a; }

.list-add-row { display:flex; justify-content:flex-end; padding:.2rem 0 .4rem; }
.btn-add-list { background:var(--accent); border:none; color:#fff; width:32px; height:32px; border-radius:50%; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; box-shadow:0 4px 16px rgba(245,80,54,.35); }
/* Loading/error */
.empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:.72rem; line-height:2; }
.loading-state { text-align:center; padding:2rem; }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.error-msg { background:rgba(240,106,106,.08); border:1px solid rgba(240,106,106,.25); border-radius:.6rem; padding:.65rem .85rem; font-size:.68rem; color:#f06a6a; line-height:1.6; display:none; }

/* Read overlay */

/* Edit modal */

.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:1.2rem; padding:1.5rem; width:100%; max-width:600px; display:flex; flex-direction:column; gap:1rem; animation:modalIn .2s ease-out; margin:auto; }

.modal-label { font-size:.58rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }

.modal-btn-cancel { background:none; border:1px solid var(--border); color:var(--muted); }
.modal-btn-copy { background:none; border:1px solid var(--border); color:var(--muted); }
.modal-btn-confirm { background:var(--live); color:#0a0a0f; font-weight:500; }

.modal-spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(10,10,15,.2); border-top-color:#0a0a0f; border-radius:50%; animation:spin .6s linear infinite; margin-right:.3rem; vertical-align:middle; }
/* ── ANNOT POPUP — più grande, con sezione AI ── */
.annot-popup { display:none; position:fixed; inset:0; z-index:90; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); align-items:flex-end; justify-content:center; }
.annot-popup.show { display:flex; }
.annot-popup-card { background:var(--surface); border:1px solid var(--border); border-top-left-radius:1.4rem; border-top-right-radius:1.4rem; width:100%; max-width:640px; display:flex; flex-direction:column; gap:.8rem; padding:1.3rem 1.3rem 1.6rem; animation:slideUp .25s ease-out; max-height:94vh; overflow-y:auto; }
.annot-popup-header { display:flex; justify-content:space-between; align-items:flex-start; }
.annot-popup-title-input { font-family:'DM Serif Display',serif; font-size:1.05rem; color:var(--text); background:none; border:none; border-bottom:1px solid var(--border); outline:none; width:100%; padding:.15rem 0; transition:border-color .2s; }
.annot-popup-title-input:focus { border-color:var(--accent); }
.annot-popup-title-input::placeholder { color:var(--muted); font-style:italic; }
.annot-popup-close { background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; padding:.1rem .3rem; line-height:1; flex-shrink:0; margin-left:.5rem; }
.annot-popup-date { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:.25rem; }
/* Editor area */
.annot-popup-editor { background:var(--bg); border:1px solid var(--border); border-radius:.8rem; color:var(--text); font-family:'Crimson Pro',Georgia,serif; font-size:1rem; line-height:1.85; padding:.8rem; outline:none; width:100%; min-height:160px; max-height:28vh; overflow-y:auto; transition:border-color .2s; caret-color:var(--accent); }
.annot-popup-editor:focus { border-color:var(--accent); }
.annot-popup-editor:empty::before { content:attr(data-placeholder); color:var(--muted); pointer-events:none; display:block; font-family:'JetBrains Mono',monospace; font-size:.8rem; }
.annot-popup-editor p { margin-bottom:.4rem; }
.annot-popup-editor h1 { font-family:'Crimson Pro',Georgia,serif; font-size:1.7em; font-weight:500; color:#ffffff; line-height:1.3; margin:.1em 0 .5em; border-bottom:1px solid var(--border); padding-bottom:.3em; }
.annot-popup-editor h2 { font-family:'Crimson Pro',Georgia,serif; font-size:1.35em; font-weight:500; color:#dddddd; line-height:1.35; margin:.9em 0 .4em; }
.annot-popup-editor h3 { font-family:'Crimson Pro',Georgia,serif; font-size:1.1em; font-weight:500; color:#bbbbbb; line-height:1.4; margin:.8em 0 .3em; }
.annot-popup-editor strong { color:#ffffff; font-weight:600; }
.annot-popup-editor em { color:#ffffff; font-style:italic; font-family:"EB Garamond",Georgia,serif; }
.annot-popup-editor ul, .annot-popup-editor ol { margin:.3em 0 .3em 1.5em; padding:0; }
.annot-popup-editor li { margin:.15em 0; }
/* Formatting toolbar */
.fmt-toolbar { display:flex; align-items:center; gap:.2rem; justify-content:space-between; width:100%; flex-wrap:nowrap; }
.fmt-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:.3rem 0; border-radius:.4rem; font-family:'JetBrains Mono',monospace; font-size:.62rem; cursor:pointer; touch-action:manipulation; transition:all .12s; white-space:nowrap; line-height:1.4; user-select:none; -webkit-user-select:none; text-transform:uppercase; letter-spacing:.04em; flex:1; text-align:center; }
.fmt-btn.active { background:rgba(245,80,54,.15); color:var(--accent); border-color:rgba(245,80,54,.45); }
.fmt-btn:hover:not(.active) { background:var(--surface); color:var(--text); border-color:var(--border); }
.fmt-sep { width:1px; height:16px; background:var(--border); margin:0 4px; flex-shrink:0; }
/* AI section in popup */
.popup-ai-section { display:flex; flex-direction:column; gap:.6rem; border-top:1px solid var(--border); padding-top:.7rem; }
.popup-ai-output { background:var(--bg); border:1px solid var(--border); border-radius:.8rem; color:var(--text); font-size:.82rem; line-height:1.85; padding:.8rem; min-height:80px; max-height:22vh; overflow-y:auto; display:none; }
.popup-ai-output.show { display:block; }
.popup-ai-output p { margin-bottom:.5rem; }
.popup-ai-output h3 { font-family:'DM Serif Display',serif; font-size:.95rem; margin:.6rem 0 .25rem; }
.popup-mood { font-size:.75rem; color:var(--muted); font-style:italic; padding:.4rem 0 0; display:none; }
.popup-mood.show { display:block; }
/* Popup footer */
.annot-popup-words { font-size:.6rem; color:var(--muted); }
.annot-popup-actions { display:flex; gap:.2rem; align-items:center; width:100%; flex-wrap:nowrap; }
.popup-footer { display:flex; flex-direction:column; gap:.5rem; width:100%; margin-top:.5rem; }
.popup-row-words { display:flex; align-items:center; gap:.5rem; }
.popup-row-mic { display:flex; justify-content:center; width:100%; padding-top:.25rem; }
.mic-btn-sm { width:36px; height:36px; border-radius:50%; border:none; background:var(--accent); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .12s; touch-action:manipulation; box-shadow:0 3px 12px rgba(245,80,54,.35); flex-shrink:0; }
.mic-btn-sm:active { transform:scale(.92); }
.mic-btn-sm.recording { background:#c0392b; animation:pulse 1.4s ease-in-out infinite; }
.mic-btn-sm svg { width:18px; height:18px; }

.btn-ghost-sm { background:none; border:1px solid var(--border); color:var(--muted); padding:.35rem 0; border-radius:.5rem; font-family:'JetBrains Mono',monospace; font-size:.6rem; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; touch-action:manipulation; white-space:nowrap; flex:1; text-align:center; }

.btn-ai-sm { background:none; border:1px solid rgba(245,80,54,.5); color:var(--accent); padding:.35rem 0; border-radius:.5rem; font-family:'JetBrains Mono',monospace; font-size:.6rem; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; touch-action:manipulation; white-space:nowrap; transition:background .15s; flex:2; text-align:center; }

<body>
<div class="container">

  <div class="header-row">
    <header>
      <h1>Diario <em>Viva</em></h1>
      <p class="subtitle">Le tue note e pensieri</p>
    </header>
    <div class="view-switcher">
      <button class="view-btn active" id="viewCalBtn">Calendario</button>
      <button class="view-btn" id="viewListBtn">Cronologia</button>
    </div>
  </div>

  <div class="mode-switcher">
    <a class="mode-btn" href="index.html">Annotazioni</a>
    <button class="mode-btn active">Diario</button>
  </div>

  <div id="calendarView">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="prevMonth">&larr;</button>
      <span class="cal-month" id="calMonthLabel"></span>
      <button class="cal-nav-btn" id="nextMonth">&rarr;</button>

    <div class="cal-grid" id="calGrid"></div>
    <div class="day-panel" id="dayPanel"></div>
  </div>

  <div id="listView" style="display:none">
    <div class="list-add-row">
      <button class="btn-add-list" id="listAddBtn" title="Nuova annotazione">+</button>
    </div>
    <div class="notes-section" id="notesList"></div>
  </div>

  <div class="loading-state" id="loadingState"><div class="spinner"></div></div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- ANNOT POPUP — più grande, con AI -->
<div class="annot-popup" id="annotPopup">
  <div class="annot-popup-card">
    <div class="annot-popup-header">
      <div style="flex:1">
        <input class="annot-popup-title-input" id="annotPopupTitleInput" type="text" placeholder="Titolo annotazione...">
        <div class="annot-popup-date" id="annotPopupDate"></div>
      </div>
      <button class="annot-popup-close" id="annotPopupClose">&#x2715;</button>
    </div>

    <div class="annot-popup-editor" id="annotPopupEditor" contenteditable="true" spellcheck="true" data-placeholder="Scrivi qui o usa il microfono per dettare..."></div>

    <div class="popup-footer">

      </div>
      <!-- Riga 2: toolbar formattazione -->
      <div class="fmt-toolbar">
        <button class="fmt-btn" id="fmtH1">𝐓 H¹</button>
        <button class="fmt-btn" id="fmtH2">𝐓 H²</button>
        <button class="fmt-btn" id="fmtH3">𝐓 H³</button>
        <span class="fmt-sep"></span>
        <button class="fmt-btn" id="fmtBold">𝐁</button>
        <button class="fmt-btn" id="fmtItalic">𝐼</button>
        <span class="fmt-sep"></span>
        <button class="fmt-btn" id="fmtUl"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:middle"><circle cx="2" cy="4" r="1.5"/><rect x="5" y="3" width="10" height="2" rx="1"/><circle cx="2" cy="8" r="1.5"/><rect x="5" y="7" width="10" height="2" rx="1"/><circle cx="2" cy="12" r="1.5"/><rect x="5" y="11" width="10" height="2" rx="1"/></svg></button>

      <div class="popup-row-mic" style="gap:.75rem;">
        <button class="mic-btn-sm" id="popupMicBtn">
          <svg id="popupMicIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <svg id="popupStopIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <input type="file" id="popupPhotoInput" accept="image/*" capture="environment" style="display:none">

    <!-- Sezione feedback trascrizione foto (visibile dopo analisi foto) -->

// ── DIARY AI SYSTEM PROMPT ────────────────────────────────────────────────────
const DIARY_SYSTEM_PROMPT = 'Sei un lettore empatico e un analista dell\'animo umano. Ricevi una nota personale — diario, sfogo, pensiero, appunto vocale trascritto, appunti di studio, trascrizione di riunione.\n\nREGOLE ASSOLUTE — NON DEROGABILI:\n\n1. STRUTTURA OBBLIGATORIA: Dividi SEMPRE il testo in sezioni distinte con <h2> per i macro-temi e <h3> per i sotto-temi. Ogni sezione deve contenere almeno un paragrafo <p>. Mai un blocco unico di testo continuo.\n\n2. ELENCHI: Quando emergono elementi enumerabili — emozioni, azioni, pensieri ricorrenti, concetti — usali come <ul> o <ol>. Non condensare in prosa ciò che è naturalmente una lista.\n\n3. IMMAGINI EVOCATIVE: I riferimenti concreti — nomi di persone, luoghi, oggetti, libri, film, date — non vanno MAI rimossi o generalizzati. Sono il cuore del testo. Citali e approfondiscili.\n\n4. TONO EMOTIVO: Non descrivere le emozioni dall\'esterno. Entra nel testo, interpretale, approfondiscile. Cerca cosa c\'è sotto la superficie — i desideri nascosti, le contraddizioni, le paure non dette.\n\n5. ADATTA IL RUOLO al tipo di contenuto: empatico per diari, preciso per appunti tecnici, esecutivo per riunioni.\n\nSTATO D\'ANIMO: Chiudi sempre con:\n<div id="mood-output">Una frase densa e specifica che cita elementi concreti del testo — non emozioni generiche.</div>\n\nRispondi SOLO con HTML valido (<p>, <h2>, <h3>, <ul>, <ol>, <li> e il blocco mood). Zero commenti fuori dall\'HTML. VIETATO markdown. Scrivi sempre in italiano.';

let _editOrigTxt = '';
editAiBtn.onclick = async () => {
  const GROQ_D=localStorage.getItem('vv_groq')||'';
  if(!GROQ_D){showErr('Chiave Groq non trovata.');return;}
  const plainText = (editContent.innerText || '').trim();
  if (!plainText) return;

  // Prima elaborazione: mostra onboarding stile se non ancora scelto
  if (ProfileManager.needsOnboarding()) {
    ProfileManager.renderOnboarding(document.querySelector('.modal-card') || document.body, async () => {
      editAiBtn.onclick();
    });
    return;
  }

  _editOrigTxt = plainText;
  editIsSummarizing = true; editAiBtn.disabled = true;
  editAiSection.style.display = 'flex'; editAiSection.style.flexDirection = 'column'; editAiSection.style.gap = '.6rem';
  editAiOutput.classList.add('show');
  editAiOutput.innerHTML = '<span style="color:var(--muted);font-size:.75rem">Elaborazione in corso...</span>';
  editAiMood.classList.remove('show');
  for (let a = 1; a <= 3; a++) {
    try {
      if (a > 1) await sleep(Math.min(1000 * Math.pow(2, a - 1), 8000));
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST', cache: 'no-store',
        headers: {'Authorization':'Bearer '+GROQ_D, 'Content-Type': 'application/json'},
        body: JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:1500,temperature:0.4,
          messages:[
            {role:'system',content:ProfileManager.buildSystemPrompt(DIARY_SYSTEM_PROMPT)},
            {role:'user',content:plainText.slice(0,3000)}
          ]})
      });
      if (res.status === 429) { const w=parseInt(res.headers.get('retry-after')||'10',10); await sleep(Math.min(w,30)*1000); a--; continue; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = (await res.json()).choices?.[0]?.message?.content?.trim() || '';
      const moodMatch = raw.match(/<div id="mood-output">([\s\S]*?)<\/div>/i);
      const moodContent = moodMatch ? moodMatch[1].trim() : '';
      const mainHtml = raw.replace(/<div id="mood-output">[\s\S]*?<\/div>/i, '').trim();
      editAiOutput.innerHTML = mainHtml || '<p>Nessun risultato.</p>';
      if (moodContent) { editAiMood.textContent = 'Stato d\'animo: ' + moodContent; editAiMood.classList.add('show'); }
      editSaveAi.disabled = false;
      break;
    } catch(e) {
      if (a === 3) { editAiOutput.innerHTML = '<p style="color:#f06a6a">Errore: ' + e.message + '</p>'; }
    }
  }
  editIsSummarizing = false; editAiBtn.disabled = false;
};

      if (!res.ok) throw new Error('HTTP '+res.status);
      const raw=(await res.json()).choices?.[0]?.message?.content?.trim()||'';

function eGetBlock(node) {
  var el = node && node.nodeType === 3 ? node.parentElement : node;
  var blocks = ['p','div','h1','h2','h3','h4','h5','h6','li','blockquote'];
  while (el && el !== editContent) {
    if (blocks.indexOf(el.tagName.toLowerCase()) !== -1) return el;
    el = el.parentElement;
  }
  return null;
}
function eGetCurrentBlock() {
  var sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return null;
  return eGetBlock(sel.anchorNode);
}

function eBreakOutOfFormat(format) {
  var sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  var tags    = (format === 'bold') ? ['b','strong'] : ['i','em'];
  var otherOn = (format === 'bold') ? eActiveFormats.italic : eActiveFormats.bold;
  var otherTag = (format === 'bold') ? 'em' : 'strong';
  var range  = sel.getRangeAt(0), node = range.startContainer, offset = range.startOffset;
  var fmtEl  = null, el = (node.nodeType === 3) ? node.parentElement : node;
  while (el && el !== editContent) {
    var t = el.tagName ? el.tagName.toLowerCase() : '';
    if (tags.indexOf(t) !== -1) { fmtEl = el; break; }
    el = el.parentElement;
  }
  if (!fmtEl) return;
  if (node.nodeType === 3 && offset > 0 && offset < node.length) node.splitText(offset);
  var anchor = document.createTextNode('\u200B');
  var insertNode;
  if (otherOn) { insertNode = document.createElement(otherTag); insertNode.appendChild(anchor); }
  else { insertNode = anchor; }
  if (fmtEl.nextSibling) fmtEl.parentNode.insertBefore(insertNode, fmtEl.nextSibling);
  else fmtEl.parentNode.appendChild(insertNode);
  var nr = document.createRange();
  nr.setStart(anchor, 1); nr.collapse(true);
  sel.removeAllRanges(); sel.addRange(nr);
  eLastRange = nr.cloneRange();
}

function eCMD(type) {
  editContent.focus();
  if (type === 'bold') {
    var wasOn = document.queryCommandState('bold');
    document.execCommand('bold', false, null);
    eActiveFormats.bold = !wasOn;
    if (wasOn) eBreakOutOfFormat('bold');
  } else if (type === 'italic') {
    var wasOn2 = document.queryCommandState('italic');
    document.execCommand('italic', false, null);
    eActiveFormats.italic = !wasOn2;
    if (wasOn2) eBreakOutOfFormat('italic');
  } else if (type === 'ul' || type === 'ol') {
    var currentSel = window.getSelection();
    var hasCurrentSel = currentSel && currentSel.rangeCount > 0 && editContent.contains(currentSel.getRangeAt(0).startContainer);
    if (!hasCurrentSel && eLastRange) {
      editContent.focus();
      var sel3 = window.getSelection(); sel3.removeAllRanges(); sel3.addRange(eLastRange);
    } else { editContent.focus(); }
    document.execCommand(type === 'ul' ? 'insertUnorderedList' : 'insertOrderedList', false, null);
  } else if (type === 'h1' || type === 'h2' || type === 'h3') {
    var sel2 = window.getSelection();
    if (!sel2 || !sel2.rangeCount) return;
    var block = eGetBlock(sel2.anchorNode);
    if (block && block.tagName.toLowerCase() === type) { document.execCommand('formatBlock', false, 'div'); }
    else { document.execCommand('formatBlock', false, type); }
  }
  eRefreshToolbar();
}

function eGetNodeFormatting(node) {
  var r = { bold: false, italic: false };
  if (!node) return r;
  var el = node.nodeType === 3 ? node.parentElement : node;
  while (el && el !== editContent) {
    var t = el.tagName ? el.tagName.toLowerCase() : '';
    if (t === 'b' || t === 'strong') r.bold = true;
    if (t === 'i' || t === 'em')     r.italic = true;
    el = el.parentElement;
  }
  return r;
}
function eGetNodeBeforeCursor() {
  var sel = window.getSelection(); if (!sel || !sel.rangeCount) return null;
  var range = sel.getRangeAt(0), node = range.startContainer, off = range.startOffset;
  if (node.nodeType === 3) return off > 0 ? node : null;
  return off > 0 ? node.childNodes[off-1] : null;
}
function eGetNodeAfterCursor() {
  var sel = window.getSelection(); if (!sel || !sel.rangeCount) return null;
  var range = sel.getRangeAt(0), node = range.startContainer, off = range.startOffset;
  if (node.nodeType === 3) return off < node.length ? node : null;
  return off < node.childNodes.length ? node.childNodes[off] : null;
}

function eRefreshToolbar() {
  var leftFmt  = eGetNodeFormatting(eGetNodeBeforeCursor());
  var rightFmt = eGetNodeFormatting(eGetNodeAfterCursor());
  $('editFmtBold').classList.toggle('active',   leftFmt.bold   || rightFmt.bold   || eActiveFormats.bold);
  $('editFmtItalic').classList.toggle('active', leftFmt.italic || rightFmt.italic || eActiveFormats.italic);
  var block = eGetCurrentBlock();
  var tag   = block ? block.tagName.toLowerCase() : '';
  $('editFmtH1').classList.toggle('active', tag === 'h1');
  $('editFmtH2').classList.toggle('active', tag === 'h2');
  $('editFmtH3').classList.toggle('active', tag === 'h3');
  $('editFmtUl').classList.toggle('active', document.queryCommandState('insertUnorderedList'));
  $('editFmtOl').classList.toggle('active', document.queryCommandState('insertOrderedList'));
}

editContent.addEventListener('keydown', function(e) {
  var ctrl = e.ctrlKey || e.metaKey;
  if (!ctrl) { setTimeout(eRefreshToolbar, 0); return; }
  var k = e.key.toLowerCase();
  if (e.key === '1') { e.preventDefault(); eCMD('h1'); }
  else if (e.key === '2') { e.preventDefault(); eCMD('h2'); }
  else if (e.key === '3') { e.preventDefault(); eCMD('h3'); }
  else if (k === 'b') { e.preventDefault(); eCMD('bold'); }
  else if (k === 'i') { e.preventDefault(); eCMD('italic'); }
  else if (k === 'u') { e.preventDefault(); eCMD('ul'); }
  else if (k === 'o') { e.preventDefault(); eCMD('ol'); }
});

async function loadNotes() {
  loadingState.style.display='block'; hideErr();
  if(!sb) { showErr('Supabase non inizializzato.'); loadingState.style.display='none'; return; }
  try {
    const{data,error}=await sb.from('notes').select('*').order('note_date',{ascending:false});
    if(error) throw error;
    allNotes=data||[]; loadingState.style.display='none';
    if(currentView==='calendar') renderCalendar(); else renderList();
  } catch(e) { loadingState.style.display='none'; showErr('Errore caricamento note: '+(e.message||e)); }
}

async function deleteNote(id) {
  if(!confirm('Eliminare questa nota?')) return;
  try {
    const{error}=await sb.from('notes').delete().eq('id',id);
    if(error) throw error;
    await loadNotes();
  } catch(e) { showErr('Errore eliminazione: '+(e.message||e)); }
}

function switchView(view) {
  currentView=view;
  if(view==='calendar') {
    $('viewCalBtn').classList.add('active'); $('viewListBtn').classList.remove('active');
    calendarView.style.display=''; listView.style.display='none'; renderCalendar();
  } else {
    $('viewListBtn').classList.add('active'); $('viewCalBtn').classList.remove('active');
    calendarView.style.display='none'; listView.style.display=''; renderList();
  }
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  calMonthLabel.textContent=MONTHS_IT[currentMonth]+' '+currentYear;
  const noteDates=new Set();
  const ms=currentYear+'-'+String(currentMonth+1).padStart(2,'0');
  allNotes.forEach(n=>{if(n.note_date&&n.note_date.startsWith(ms))noteDates.add(n.note_date);});
  const firstDay=new Date(currentYear,currentMonth,1);
  let startDow=firstDay.getDay(); startDow=startDow===0?6:startDow-1;
  const dim=new Date(currentYear,currentMonth+1,0).getDate();
  const pmd=new Date(currentYear,currentMonth,0).getDate();
  const td=new Date();
  const ts=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(td.getDate()).padStart(2,'0');
  let html='';
  DAYS_IT.forEach(d=>{html+='<div class="cal-header">'+d+'</div>';});
  for(let i=startDow-1;i>=0;i--) html+='<div class="cal-day other">'+(pmd-i)+'</div>';
  for(let d=1;d<=dim;d++) {
    const dateStr=currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=dateStr===ts, hasN=noteDates.has(dateStr), isSel=selectedDay===d;
    let cls='cal-day'; if(isToday) cls+=' today'; if(hasN) cls+=' has-notes'; if(isSel) cls+=' selected';
    html+='<div class="'+cls+'" data-day="'+d+'" data-date="'+dateStr+'">'+d
      +(hasN?'<span class="cal-dot"></span>':'')
      +'<button class="add-btn" data-date="'+dateStr+'">+</button></div>';
  }
  const rem=(startDow+dim)%7===0?0:7-(startDow+dim)%7;
  for(let i=1;i<=rem;i++) html+='<div class="cal-day other">'+i+'</div>';
  calGrid.innerHTML=html;
  calGrid.querySelectorAll('.add-btn').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();openAnnotPopup(b.dataset.date);};
  });
  calGrid.querySelectorAll('.cal-day.has-notes').forEach(el=>{
    el.onclick=()=>{
      const day=parseInt(el.dataset.day), dateStr=el.dataset.date;
      selectedDay=day;
      calGrid.querySelectorAll('.cal-day').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected'); showDayPanel(dateStr);
    };
  });
  if(selectedDay) {
    const ds=currentYear+'-'+String(currentMonth+1).padStart(2,'0')+'-'+String(selectedDay).padStart(2,'0');
    showDayPanel(ds);
  } else { dayPanel.innerHTML=''; }
}

function tagsHtml(mode) {
  if(!mode) return '';
  const tags=(mode||'').split('+').map(t=>t.trim()).filter(Boolean);
  return tags.map(t=>{
    const cls=t==='write'?'note-tag tag-write':t==='AI'?'note-tag tag-ai':t==='photo'?'note-tag tag-photo':'note-tag';
    return '<span class="'+cls+'">'+esc(t)+'</span>';
  }).join('');
}

function showDayPanel(dateStr) {
  const notes=allNotes.filter(n=>n.note_date===dateStr);
  if(!notes.length){dayPanel.innerHTML='';return;}
  const do2=new Date(dateStr+'T12:00:00');
  let html='<div class="day-panel-header">'+do2.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})+'</div>';
  notes.forEach(n=>{
    html+='<div class="read-card" data-id="'+n.id+'">'
      +'<div class="read-card-top"><div class="read-card-title">'+esc(n.title)+'</div>'
      +'<button class="read-card-close" data-id="'+n.id+'">&#x2715;</button></div>'
      +'<div class="read-card-body">'+n.content+'</div>'
      +'<div class="read-card-footer">'
      +'<button class="btn-delete-card" data-id="'+n.id+'">Elimina</button>'
      +'<button class="btn-edit" data-id="'+n.id+'">Modifica</button>'
      +'</div></div>';
  });
  dayPanel.innerHTML=html;
  dayPanel.querySelectorAll('.read-card-close').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();dayPanel.innerHTML='';selectedDay=null;calGrid.querySelectorAll('.cal-day').forEach(c=>c.classList.remove('selected'));};
  });
  dayPanel.querySelectorAll('.btn-edit').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();const note=allNotes.find(n=>n.id===b.dataset.id);if(note)openEditModal(note);};
  });
  dayPanel.querySelectorAll('.btn-delete-card').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();deleteNote(b.dataset.id);};
  });
}

function renderList() {
  if(!allNotes.length){notesList.innerHTML='<div class="empty-state">Nessuna nota nel diario.<br>Registra o scrivi qualcosa e salvalo!</div>';return;}
  const weeks={};
  allNotes.forEach(n=>{
    const d=new Date(n.note_date+'T12:00:00'), ws=getWeekStart(d), key=ws.toISOString().split('T')[0];
    if(!weeks[key]) weeks[key]=[];
    weeks[key].push(n);
  });
  const sw=Object.keys(weeks).sort((a,b)=>b.localeCompare(a));
  let html='';
  sw.forEach(wk=>{
    const ws=new Date(wk+'T12:00:00'), we=new Date(ws); we.setDate(we.getDate()+6);
    html+='<div class="week-header">'+ws.toLocaleDateString('it-IT',{day:'numeric',month:'short'})+' – '+we.toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'})+'</div>';
    weeks[wk].forEach(n=>{
      const ds=new Date(n.note_date+'T12:00:00').toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'});
      html+='<div class="note-card" data-id="'+n.id+'">'
        +'<div class="note-card-main">'
        +'<span class="note-title">'+esc(n.title)+'</span>'
        +'<div class="note-meta"><span class="note-date">'+ds+'</span><div class="note-tags">'+tagsHtml(n.mode)+'</div></div>'
        +'</div>'
        +'<div class="note-card-actions" onclick="event.stopPropagation()">'
        +'<button class="note-card-btn del" data-id="'+n.id+'">Elimina</button>'
        +'<button class="note-card-btn" data-id="'+n.id+'">Modifica</button>'
        +'</div></div>';
    });
  });
  notesList.innerHTML=html;
  notesList.querySelectorAll('.note-card').forEach(c=>{
    c.onclick=()=>{const note=allNotes.find(n=>n.id===c.dataset.id);if(note)openReadOverlay(note);};
  });
  notesList.querySelectorAll('.note-card-btn:not(.del)').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();const note=allNotes.find(n=>n.id===b.dataset.id);if(note)openEditModal(note);};
  });
  notesList.querySelectorAll('.note-card-btn.del').forEach(b=>{
    b.onclick=(e)=>{e.stopPropagation();deleteNote(b.dataset.id);};
  });
}

function getWeekStart(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(d.getFullYear(),d.getMonth(),diff);}
function openReadOverlay(note){readingNote=note;readOverlayTitle.textContent=note.title;readOverlayBody.innerHTML=note.content;readOverlay.classList.add('show');}
function openEditModal(note){
  editingNote=note; editTitle.value=note.title; editDate.value=note.note_date; editContent.innerHTML=note.content;
  editAiSection.style.display='none';
  editAiOutput.classList.remove('show'); editAiMood.classList.remove('show');
  editAiOutput.innerHTML=''; editAiMood.textContent='';
  editSaveAi.disabled=true; editAiBtn.disabled=false;
  editModal.classList.add('show'); setTimeout(()=>{editContent.scrollTop=0;},50);
}

function showErr(m){errorMsg.textContent=m;errorMsg.classList.add('show');}
function hideErr(){errorMsg.classList.remove('show');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function htmlToMarkdown(html){
  const d=document.createElement('div');d.innerHTML=html;
  function w(n){
    if(n.nodeType===3)return n.textContent;
    const t=(n.tagName||'').toLowerCase(),c=Array.from(n.childNodes).map(w).join('');
    if(t==='h1')return'# '+c.trim()+'\n\n';if(t==='h2')return'## '+c.trim()+'\n\n';if(t==='h3')return'### '+c.trim()+'\n\n';
    if(t==='p')return c.trim()+'\n\n';if(t==='ul')return c+'\n';if(t==='li')return'- '+c.trim()+'\n';
    if(t==='strong'||t==='b')return'**'+c+'**';if(t==='em'||t==='i')return'*'+c+'*';if(t==='br')return'\n';
    return c;
  }
  return w(d).replace(/\n{3,}/g,'\n\n').trim();
}

function pGetNodeAfterCursor() {
  var sel = window.getSelection(); if (!sel || !sel.rangeCount) return null;
  var range = sel.getRangeAt(0), node = range.startContainer, off = range.startOffset;
  if (node.nodeType === 3) return off < node.length ? node : null;
  return off < node.childNodes.length ? node.childNodes[off] : null;
}

function pRefreshToolbar() {
  var leftFmt  = pGetNodeFormatting(pGetNodeBeforeCursor());
  var rightFmt = pGetNodeFormatting(pGetNodeAfterCursor());
  var showBold   = leftFmt.bold   || rightFmt.bold   || pActiveFormats.bold;
  var showItalic = leftFmt.italic || rightFmt.italic || pActiveFormats.italic;
  $('fmtBold').classList.toggle('active',   showBold);

function getRMSP(){if(!popupAnalyser)return 0;popupAnalyser.getFloatTimeDomainData(analyserBufP);let s=0;for(let i=0;i<analyserBufP.length;i++)s+=analyserBufP[i]*analyserBufP[i];return Math.sqrt(s/analyserBufP.length);}
function hasSpeechP(arr){return arr.length>0&&arr.filter(v=>v>SILENCE_THR_P).length/arr.length>SPEECH_RATIO_P;}

async function initRNNoiseP(){
  if(popupRnnoiseModule)return true;
  try{if(typeof createRNNWasmModule==='undefined')return false;popupRnnoiseModule=await createRNNWasmModule();popupRnnoiseState=popupRnnoiseModule._rnnoise_create(0);return true;}catch(e){return false;}
}

async function startPopupRec(){
  const GROQ=localStorage.getItem('vv_groq')||'';
  if(!GROQ){showErr('Chiave Groq non trovata. Salvala nella pagina principale.');return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,sampleRate:48000,channelCount:1}});}
  catch(e){showErr('Microfono: '+e.message);return;}
  popupStream=stream;initRNNoiseP();
  popupAudioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
  const src=popupAudioCtx.createMediaStreamSource(stream);
  const hpf=popupAudioCtx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=80;hpf.Q.value=0.7;
  const lpf=popupAudioCtx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=4000;lpf.Q.value=0.7;
  const comp=popupAudioCtx.createDynamicsCompressor();comp.threshold.value=-20;comp.knee.value=8;comp.ratio.value=8;comp.attack.value=0.002;comp.release.value=0.2;
  const gain=popupAudioCtx.createGain();gain.gain.value=1.6;popupAdaptiveGain=gain;
  popupAnalyser=popupAudioCtx.createAnalyser();popupAnalyser.fftSize=2048;popupAnalyser.smoothingTimeConstant=0.6;
  src.connect(hpf);hpf.connect(lpf);lpf.connect(comp);comp.connect(gain);gain.connect(popupAnalyser);
  const silOsc=popupAudioCtx.createOscillator();const silGain=popupAudioCtx.createGain();silGain.gain.value=0.00001;
  silOsc.connect(silGain);silGain.connect(popupAudioCtx.destination);silOsc.start();
  popupPendingChunks=[];popupIsRecording=true;popupHasRec=true;
  popupMicBtn.classList.add('recording');popupMicIcon.style.display='none';popupStopIcon.style.display='block';
  popupLiveDot.className='live-dot-sm on';
  const mimes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4',''];
  const bestMime=mimes.find(m=>!m||MediaRecorder.isTypeSupported(m));
  doPopupSegment(stream,bestMime);
}

function doPopupSegment(stream,mime){
  if(!popupIsRecording)return;
  const chunks=[],rmsVals=[];let rmsInt=null,overlapTimer=null,mr;
  try{const o={audioBitsPerSecond:128000};if(mime)o.mimeType=mime;mr=new MediaRecorder(stream,o);}
  catch(e){try{mr=new MediaRecorder(stream,{audioBitsPerSecond:128000});}catch(e2){mr=new MediaRecorder(stream);}}
  mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
  mr.onstart=()=>{rmsInt=setInterval(()=>rmsVals.push(getRMSP()),200);overlapTimer=setTimeout(()=>{if(popupIsRecording)doPopupSegment(stream,mime);},CHUNK_MS_P-OVERLAP_MS_P);};
  mr.onstop=async()=>{
    clearInterval(rmsInt);clearTimeout(overlapTimer);if(!chunks.length)return;
    const blob=new Blob(chunks,{type:mr.mimeType||mime||'audio/webm'});
    if(hasSpeechP(rmsVals)&&blob.size>=MIN_BLOB_P&&blob.size<=MAX_BLOB_P)popupPendingChunks.push(blob);
    if(!popupIsTranscribing)drainPopupQueue();
  };
  mr.onerror=()=>{clearInterval(rmsInt);clearTimeout(overlapTimer);if(popupIsRecording)setTimeout(()=>doPopupSegment(stream,mime),500);};
  popupChunkTimer=setTimeout(()=>{try{if(mr.state==='recording')mr.stop();}catch(e){}},CHUNK_MS_P);
  try{mr.start(250);}catch(e){}
  popupMR=mr;
}

async function stopPopupRec(){
  if(!popupIsRecording)return;
  popupIsRecording=false;clearTimeout(popupChunkTimer);
  try{if(popupMR&&popupMR.state==='recording')popupMR.stop();}catch(e){}
  if(popupStream){popupStream.getTracks().forEach(t=>t.stop());popupStream=null;}
  if(popupAudioCtx){try{popupAudioCtx.close();}catch(e){}popupAudioCtx=null;popupAnalyser=null;}
  popupMicBtn.classList.remove('recording');popupMicIcon.style.display='block';popupStopIcon.style.display='none';
  popupLiveDot.className='live-dot-sm';popupProcPill.classList.add('show');
  await sleep(300);
  while(popupPendingChunks.length)await transcribePopupBlob(popupPendingChunks.shift());
  popupProcPill.classList.remove('show');popupLiveDot.className='live-dot-sm done';
}

popupMicBtn.onclick=()=>{if(!popupIsRecording)startPopupRec();else stopPopupRec();};

async function drainPopupQueue(){
  if(popupIsTranscribing||!popupPendingChunks.length)return;
  popupIsTranscribing=true;popupProcPill.classList.add('show');
  while(popupPendingChunks.length)await transcribePopupBlob(popupPendingChunks.shift());
  popupProcPill.classList.remove('show');popupIsTranscribing=false;
}

async function transcribePopupBlob(blob){
  const GROQ=localStorage.getItem('vv_groq')||'';if(!GROQ)return;
  if(popupRnnoiseModule&&popupRnnoiseState)blob=await applyRNNoiseP(blob);
  const mt=blob.type||'',ext=mt.includes('wav')?'wav':mt.includes('ogg')?'ogg':mt.includes('mp4')?'mp4':'webm';
  const form=new FormData();
  form.append('file',blob,'audio.'+ext);
  form.append('model','whisper-large-v3');
  form.append('language','it');
  form.append('response_format','text');
  // Prompt più restrittivo per ridurre allucinazioni
  const ctx=(annotPopupEditor.innerText||'').trim().split(/\s+/).slice(-60).join(' ');
  const prompt=ctx
    ?'Trascrivi esattamente le parole dette in italiano. Non aggiungere parole, non interpretare, non completare frasi. Se non senti nulla di chiaro, non scrivere nulla. Contesto recente: '+ctx
    :'Trascrivi esattamente le parole dette in italiano. Non aggiungere parole, non interpretare, non completare frasi. Se non senti nulla di chiaro, non scrivere nulla.';
  form.append('prompt',prompt);
  for(let a=1;a<=3;a++){
    try{
      if(a>1)await sleep(Math.min(1000*Math.pow(2,a-1),8000));
      const res=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',cache:'no-store',headers:{'Authorization':'Bearer '+GROQ},body:form});
      if(res.status===429){const w=parseInt(res.headers.get('retry-after')||'30',10);await sleep(Math.min(w,60)*1000);a--;continue;}
      if(!res.ok)throw new Error('HTTP '+res.status);
      const raw=(await res.text()).trim();
      const txt=raw.replace(/\.{2,}/g,'').replace(/\u2026/g,'').replace(/\s{2,}/g,' ').trim();
      if(txt&&txt!=='[BLANK_AUDIO]'&&txt.length>1){
        const curText=(annotPopupEditor.innerText||'').trim();
        const ew=curText.split(/\s+/),iw=txt.split(/\s+/);
        let best=0;
        for(let len=Math.min(20,ew.length,iw.length);len>=2;len--){
          if(ew.slice(-len).join(' ').toLowerCase()===iw.slice(0,len).join(' ').toLowerCase()){best=len;break;}
        }
        const np=best>0?iw.slice(best).join(' ').trim():txt;
        if(np){
          annotPopupEditor.focus();
          const sel=window.getSelection(),range=document.createRange();
          range.selectNodeContents(annotPopupEditor);range.collapse(false);
          sel.removeAllRanges();sel.addRange(range);
          const prefix=curText&&!/\s$/.test(annotPopupEditor.innerText)?' ':'';
          const tn=document.createTextNode(prefix+np);
          range.insertNode(tn);range.setStartAfter(tn);range.collapse(true);
          sel.removeAllRanges();sel.addRange(range);pLastRange=range.cloneRange();
          updatePopupWords();annotPopupEditor.scrollTop=annotPopupEditor.scrollHeight;
        }
      }
      return;
    }catch(e){if(a===3)showErr('Trascrizione: '+e.message);}
  }
}

async function applyRNNoiseP(blob){
  try{
    const arrayBuf=await blob.arrayBuffer();
    const tmpCtx=new OfflineAudioContext(1,1,48000);
    const decoded=await tmpCtx.decodeAudioData(arrayBuf);
    const sr=decoded.sampleRate,raw=decoded.getChannelData(0),frameSize=480;
    const resampledLen=Math.round(raw.length*48000/sr);
    const outCtx=new OfflineAudioContext(1,resampledLen,48000);
    const srcBuf=outCtx.createBuffer(1,raw.length,sr);srcBuf.copyToChannel(raw,0);
    const srcNode=outCtx.createBufferSource();srcNode.buffer=srcBuf;srcNode.connect(outCtx.destination);srcNode.start();
    const resampled=(await outCtx.startRendering()).getChannelData(0);
    const frames=Math.floor(resampled.length/frameSize);
    const output=new Float32Array(frames*frameSize);
    const framePtr=popupRnnoiseModule._malloc(frameSize*4);
    for(let i=0;i<frames;i++){
      const frame=resampled.subarray(i*frameSize,(i+1)*frameSize);
      popupRnnoiseModule.HEAPF32.set(frame,framePtr>>2);
      popupRnnoiseModule._rnnoise_process_frame(popupRnnoiseState,framePtr,framePtr);
      output.set(popupRnnoiseModule.HEAPF32.subarray(framePtr>>2,(framePtr>>2)+frameSize),i*frameSize);
    }
    popupRnnoiseModule._free(framePtr);
    const outBuf=new AudioBuffer({numberOfChannels:1,length:output.length,sampleRate:48000});
    outBuf.copyToChannel(output,0);
    const n=outBuf.length,data=outBuf.getChannelData(0);
    const int16=new Int16Array(n);for(let i=0;i<n;i++)int16[i]=Math.max(-32768,Math.min(32767,data[i]*32767));
    const buf=new ArrayBuffer(44+n*2);const v=new DataView(buf);
    const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
    ws(0,'RIFF');v.setUint32(4,36+n*2,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);
    v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,48000,true);v.setUint32(28,96000,true);
    v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,n*2,true);
    new Int16Array(buf,44).set(int16);
    return new Blob([buf],{type:'audio/wav'});
  }catch(e){return blob;}
}

      method: 'POST',

      headers: { 'Authorization': 'Bearer ' + GROQ, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'meta-llama/llama-4-scout-17b-16e-instruct',
        max_tokens: 1500,
        temperature: 0.1,
        messages: [{
          role: 'user',
          content: [
            { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + popupPhotoBase64 } },
            { type: 'text', text: 'Analizza questo appunto scritto a mano in italiano. Se contiene solo testo scritto, trascrivilo fedelmente rispettando la struttura (a capo, rientri, elenchi). Se contiene schemi, frecce, mappe concettuali o diagrammi, trascrivi tutto il testo visibile e descrivi semanticamente lo schema: nodi, connessioni, direzione delle frecce, struttura generale. Alla fine indica obbligatoriamente su una riga separata: SCHEMA: sì oppure SCHEMA: no' }
          ]
        }]
      })
    });

    if (!res.ok) throw new Error('Errore API Groq');
    const data = await res.json();
    const rawText = data?.choices?.[0]?.message?.content?.trim() || '';

    popupPhotoHasSchema = /SCHEMA:\s*sì/i.test(rawText);
    const cleanText = rawText.replace(/SCHEMA:\s*(sì|no)/i, '').trim();

    // Converti markdown → HTML per l'editor
    function mdToHtml(md) {
      const lines = md.split('\n');
      let html = '', inUl = false, inOl = false;
      const inline = t => t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/__(.*?)__/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/_(.*?)_/g,'<em>$1</em>');
      lines.forEach(line => {
        const h1=line.match(/^#\s+(.*)/),h2=line.match(/^##\s+(.*)/),h3=line.match(/^###\s+(.*)/);
        const ul=line.match(/^[-*]\s+(.*)/),ol=line.match(/^\d+\.\s+(.*)/);
        if(inUl&&!ul){html+='</ul>';inUl=false;}
        if(inOl&&!ol){html+='</ol>';inOl=false;}
        if(h3)html+='<h3>'+inline(h3[1])+'</h3>';
        else if(h2)html+='<h2>'+inline(h2[1])+'</h2>';
        else if(h1)html+='<h1>'+inline(h1[1])+'</h1>';
        else if(ul){if(!inUl){html+='<ul>';inUl=true;}html+='<li>'+inline(ul[1])+'</li>';}
        else if(ol){if(!inOl){html+='<ol>';inOl=true;}html+='<li>'+inline(ol[1])+'</li>';}
        else if(line.trim())html+='<p>'+inline(line)+'</p>';
      });
      if(inUl)html+='</ul>';if(inOl)html+='</ol>';
      return html;
    }
    annotPopupEditor.innerHTML = mdToHtml(cleanText);
    annotPopupEditor.dataset.written = '1';

    // Aggiorna conteggio parole
    const words = (annotPopupEditor.innerText || '').trim().split(/\s+/).filter(Boolean).length;
    annotPopupWords.textContent = words + (words === 1 ? ' parola' : ' parole');
    annotPopupSave.disabled = false;
    popupAiBtn.disabled = false;

    // Mostra sezione feedback trascrizione
    popupPhotoTranscriptEl.innerHTML = mdToHtml(cleanText);
    popupPhotoFeedbackSection.style.display = 'block';
    _lastPhotoRawText = cleanText;

  } catch(err) {
    showErr('Errore analisi foto: ' + (err.message || err));
    popupPhotoBase64 = null;
  }

  popupPhotoPill.classList.remove('show');
};

// Salva immagine su Supabase Storage e restituisce URL pubblico
async function uploadPhotoToStorage(base64) {
  if (!sb || !base64) return null;
  try {
    const byteString = atob(base64);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
    const blob = new Blob([ab], { type: 'image/jpeg' });
    const fileName = 'note-' + Date.now() + '.jpg';
    const { error } = await sb.storage.from('note-images').upload(fileName, blob, { contentType: 'image/jpeg', upsert: false });
    if (error) throw error;
    const { data } = sb.storage.from('note-images').getPublicUrl(fileName);
    return data?.publicUrl || null;
  } catch(e) {
    console.warn('[Photo upload]', e);
    return null;
  }
}

// Comprimi immagine lato client
function compressImageB64(file, maxPx, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

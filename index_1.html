<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voce Viva</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VoceViva">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
<script src="rnnoise-sync.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0a0a0f; --surface:#111118; --border:#1e1e2e; --accent:#f55036; --text:#e8e8f0; --muted:#5a5a7a; --live:#4ade80; --warn:#f59e0b; }
body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; display:flex; flex-direction:column; align-items:center; padding:1.5rem 1rem 3rem; -webkit-tap-highlight-color:transparent; }
body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background:radial-gradient(ellipse 80% 50% at 5% 95%,rgba(245,80,54,.08) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 95% 5%,rgba(245,80,54,.05) 0%,transparent 60%); }
.container { position:relative; z-index:1; width:100%; max-width:640px; display:flex; flex-direction:column; gap:1.1rem; }
h1 { font-family:'DM Serif Display',serif; font-size:clamp(2rem,7vw,3rem); letter-spacing:-.03em; line-height:1; }
h1 em { font-style:italic; color:var(--accent); }
.subtitle { font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.18em; margin-top:.4rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
.badge { background:rgba(245,80,54,.12); border:1px solid rgba(245,80,54,.25); color:var(--accent); padding:.1rem .5rem; border-radius:.3rem; font-size:.55rem; }
.header-row { display:flex; justify-content:space-between; align-items:flex-start; }
.diary-link { display:inline-flex; align-items:center; gap:.4rem; background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:.4rem .8rem; border-radius:.5rem; font-family:'DM Mono',monospace; font-size:.6rem; text-decoration:none; text-transform:uppercase; letter-spacing:.1em; transition:border-color .2s,color .2s; white-space:nowrap; }
.diary-link:hover { border-color:var(--accent); color:var(--accent); }
.diary-link svg { width:14px; height:14px; }
.api-card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:1.1rem; display:flex; flex-direction:column; gap:.65rem; transition:border-color .3s; }
.api-card.ok { border-color:rgba(74,222,128,.3); }
.api-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); display:flex; align-items:center; gap:.5rem; }
.dot { width:6px; height:6px; border-radius:50%; background:#f06a6a; flex-shrink:0; transition:background .3s; }
.dot.ok { background:var(--live); }
.api-row { display:flex; gap:.5rem; }
.api-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:.6rem; color:var(--text); font-family:'DM Mono',monospace; font-size:.68rem; padding:.55rem .7rem; outline:none; min-width:0; transition:border-color .2s; }
.api-input:focus { border-color:var(--accent); }
.api-input::placeholder { color:var(--muted); }
.btn-save { background:var(--accent); color:#fff; border:none; padding:.55rem .9rem; border-radius:.6rem; font-family:'DM Mono',monospace; font-size:.68rem; cursor:pointer; white-space:nowrap; touch-action:manipulation; }
.api-hint { font-size:.58rem; color:var(--muted); line-height:1.6; }
.api-hint a { color:var(--accent); text-decoration:none; }
.mode-switcher { display:flex; gap:.4rem; background:var(--surface); border:1px solid var(--border); border-radius:.8rem; padding:.35rem; }
.mode-btn { flex:1; background:none; border:none; color:var(--muted); font-family:'DM Mono',monospace; font-size:.65rem; text-transform:uppercase; letter-spacing:.12em; padding:.5rem; border-radius:.5rem; cursor:pointer; touch-action:manipulation; transition:background .2s,color .2s; text-decoration:none; display:flex; align-items:center; justify-content:center; }
.mode-btn.active { background:var(--accent); color:#fff; }
.meter-row { display:flex; align-items:center; gap:.6rem; }
.meter-label { font-size:.55rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); white-space:nowrap; }
.meter-bar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.meter-fill { height:100%; width:0%; background:var(--live); border-radius:2px; transition:width .08s linear,background .2s; }
.meter-fill.warn { background:var(--warn); }
.meter-fill.loud { background:var(--accent); }
.quality-badge { font-size:.55rem; text-transform:uppercase; letter-spacing:.1em; padding:.15rem .5rem; border-radius:.3rem; border:1px solid var(--border); color:var(--muted); white-space:nowrap; transition:all .3s; min-width:52px; text-align:center; }
.quality-badge.good { border-color:rgba(74,222,128,.4); color:var(--live); }
.quality-badge.ok { border-color:rgba(245,158,11,.4); color:var(--warn); }
.quality-badge.low { border-color:rgba(245,80,54,.4); color:var(--accent); }
.box-label { font-size:.58rem; text-transform:uppercase; letter-spacing:.15em; color:var(--muted); margin-bottom:.4rem; display:flex; align-items:center; gap:.5rem; }
.live-dot { width:5px; height:5px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background .3s; }
.live-dot.on { background:#f06a6a; animation:blink .8s ease-in-out infinite; }
.live-dot.processing { background:var(--accent); animation:blink .5s ease-in-out infinite; }
.live-dot.done { background:var(--live); animation:none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.annot-wrap { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:1.1rem; display:flex; flex-direction:column; gap:.75rem; transition:border-color .3s; }
.annot-wrap.recording { border-color:rgba(240,106,106,.5); }
.annot-wrap.done { border-color:rgba(74,222,128,.4); }
.annot-editor { background:transparent; border:none; color:var(--text); font-family:'DM Mono',monospace; font-size:.88rem; line-height:1.9; padding:0; outline:none; min-height:180px; max-height:40vh; overflow-y:auto; width:100%; white-space:pre-wrap; }
.annot-editor:empty::before { content:attr(data-placeholder); color:var(--muted); pointer-events:none; display:block; }
.fmt-toolbar { display:flex; gap:.3rem; flex-wrap:wrap; }
.fmt-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:.3rem .6rem; border-radius:.4rem; font-family:'DM Mono',monospace; font-size:.58rem; cursor:pointer; touch-action:manipulation; transition:background .15s,color .15s,border-color .15s; white-space:nowrap; line-height:1.4; user-select:none; -webkit-user-select:none; }
.fmt-btn:hover { border-color:var(--accent); color:var(--accent); }
.annot-footer { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; }
.word-count { font-size:.62rem; color:var(--muted); }
.action-btns { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
.btn-save-direct { background:rgba(74,222,128,.15); color:var(--live); border:1px solid rgba(74,222,128,.3); padding:.38rem .8rem; border-radius:.5rem; font-family:'DM Mono',monospace; font-size:.62rem; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; touch-action:manipulation; white-space:nowrap; }
.btn-save-direct:disabled { opacity:.3; cursor:not-allowed; }
.processing-pill { display:none; background:rgba(245,80,54,.12); border:1px solid rgba(245,80,54,.25); border-radius:2rem; padding:.25rem .65rem; font-size:.58rem; color:var(--accent); text-transform:uppercase; letter-spacing:.1em; align-items:center; gap:.35rem; }
.processing-pill.show { display:flex; }
.pill-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); animation:blink .6s ease-in-out infinite; }
.controls { display:flex; flex-direction:column; align-items:center; gap:.75rem; padding:.5rem 0; }
.timer { font-size:2.2rem; font-weight:300; letter-spacing:.08em; font-variant-numeric:tabular-nums; }
.waveform { display:flex; align-items:center; gap:3px; height:24px; }
.bar { width:3px; background:#f06a6a; border-radius:2px; height:3px; }
.bar.active { animation:wave .7s ease-in-out infinite; }
.bar:nth-child(1){animation-delay:.00s}.bar:nth-child(2){animation-delay:.10s}.bar:nth-child(3){animation-delay:.20s}
.bar:nth-child(4){animation-delay:.30s}.bar:nth-child(5){animation-delay:.15s}.bar:nth-child(6){animation-delay:.05s}
.bar:nth-child(7){animation-delay:.25s}.bar:nth-child(8){animation-delay:.35s}.bar:nth-child(9){animation-delay:.10s}
@keyframes wave { 0%,100%{height:3px} 50%{height:20px} }
.mic-btn { width:84px; height:84px; border-radius:50%; border:none; background:var(--accent); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .12s,box-shadow .25s; box-shadow:0 6px 28px rgba(245,80,54,.4); touch-action:manipulation; }
.mic-btn:active { transform:scale(.92); }
.mic-btn.recording { background:#c0392b; animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 6px 36px rgba(192,57,43,.55)} 50%{box-shadow:0 6px 50px rgba(192,57,43,.85),0 0 0 10px rgba(192,57,43,.1)} }
.mic-btn svg { width:34px; height:34px; }
.status-row { display:flex; align-items:center; gap:.45rem; font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:background .3s; }
.status-dot.live { background:#f06a6a; animation:blink .8s ease-in-out infinite; }
.status-dot.processing { background:var(--accent); animation:blink .5s ease-in-out infinite; }
.status-dot.done { background:var(--live); animation:none; }
.btn-ghost { background:none; border:1px solid var(--border); color:var(--muted); padding:.38rem .8rem; border-radius:.5rem; font-family:'DM Mono',monospace; font-size:.62rem; cursor:pointer; text-transform:uppercase; letter-spacing:.1em; touch-action:manipulation; }
.btn-ghost:disabled { opacity:.3; cursor:not-allowed; }
.btn-ai { background:var(--accent); color:#fff; border:none; padding:.55rem 1.1rem; border-radius:.6rem; font-family:'DM Mono',monospace; font-size:.68rem; cursor:pointer; touch-action:manipulation; display:none; }
.btn-ai:disabled { opacity:.5; cursor:not-allowed; }
.output-box { background:var(--surface); border:1px solid var(--border); border-radius:1.2rem; padding:1.4rem; display:none; flex-direction:column; gap:1rem; position:relative; overflow:hidden; }
.output-box.show { display:flex; animation:slideUp .3s ease-out; }
@keyframes slideUp { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }
.output-overlay { position:absolute; inset:0; background:rgba(17,17,24,.85); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; flex-direction:column; gap:.8rem; z-index:10; }
.output-overlay.show { display:flex; }
.overlay-text { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; }
.output-text { font-size:.9rem; line-height:1.9; color:var(--text); outline:none; }
.output-text p { margin-bottom:.6rem; }
.output-text h3 { font-family:'DM Serif Display',serif; font-size:1.15rem; margin:1rem 0 .4rem; color:var(--accent); }
.output-text h4 { font-family:'DM Serif Display',serif; font-size:.95rem; margin:.8rem 0 .3rem; color:var(--text); opacity:.9; }
.output-text ul { margin-bottom:.8rem; padding-left:1.2rem; }
.output-text li { margin-bottom:.3rem; }
.mood-box { background:rgba(147,112,219,.08); border:1px solid rgba(147,112,219,.2); border-radius:.8rem; padding:.9rem 1.1rem; display:none; }
.mood-label { font-size:.55rem; text-transform:uppercase; letter-spacing:.15em; color:#a78bfa; margin-bottom:.4rem; }
.mood-text { font-size:.78rem; line-height:1.7; color:var(--text); font-style:italic; }
.output-actions { display:none; gap:.6rem; flex-wrap:wrap; }
.btn-save-diary { background:var(--live); color:#0a0a0f; border:none; padding:.55rem 1.1rem; border-radius:.6rem; font-family:'DM Mono',monospace; font-size:.68rem; cursor:pointer; font-weight:500; touch-action:manipulation; }
.btn-save-diary:disabled { opacity:.4; cursor:not-allowed; }
.modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:1rem; }
.modal-overlay.show { display:flex; }
.modal-card { background:var(--surface); border:1px solid var(--border); border-radius:1.2rem; padding:1.5rem; width:100%; max-width:480px; display:flex; flex-direction:column; gap:1.1rem; animation:modalIn .2s ease-out; }
@keyframes modalIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.modal-title { font-family:'DM Serif Display',serif; font-size:1.2rem; color:var(--text); }
.modal-field { display:flex; flex-direction:column; gap:.35rem; }
.modal-label { font-size:.58rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }
.modal-input { background:var(--bg); border:1px solid var(--border); border-radius:.6rem; color:var(--text); font-family:'DM Mono',monospace; font-size:.78rem; padding:.55rem .7rem; outline:none; transition:border-color .2s; }
.modal-input:focus { border-color:var(--accent); }
.modal-preview { font-size:.65rem; color:var(--muted); line-height:1.6; max-height:100px; overflow-y:auto; background:rgba(0,0,0,.2); padding:.6rem; border-radius:.4rem; }
.modal-actions { display:flex; gap:.6rem; justify-content:flex-end; margin-top:.4rem; }
.modal-btn { padding:.55rem 1.1rem; border-radius:.6rem; font-family:'DM Mono',monospace; font-size:.68rem; cursor:pointer; touch-action:manipulation; border:none; }
.modal-btn-cancel { background:none; border:1px solid var(--border); color:var(--muted); }
.modal-btn-confirm { background:var(--live); color:#0a0a0f; font-weight:500; }
.modal-btn-confirm:disabled { opacity:.4; cursor:not-allowed; }
.modal-spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(10,10,15,.2); border-top-color:#0a0a0f; border-radius:50%; animation:spin .6s linear infinite; margin-right:.3rem; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.error-msg { background:rgba(240,106,106,.08); border:1px solid rgba(240,106,106,.25); border-radius:.6rem; padding:.65rem .85rem; font-size:.68rem; color:#f06a6a; line-height:1.6; display:none; }
.error-msg.show { display:block; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <header>
      <h1>Voce <em>Viva</em></h1>
      <div class="subtitle">
        Annotazioni Intelligenti
        <span class="badge">v2.1</span>
      </div>
    </header>
    <a href="diary.html" class="diary-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Diario
    </a>
  </div>

  <div class="api-card" id="apiCard">
    <div class="api-label"><span class="dot" id="apiDot"></span> Groq API Key</div>
    <div class="api-row">
      <input type="password" class="api-input" id="apiKeyInput" placeholder="Incolla qui la tua chiave gsk_...">
      <button class="btn-save" id="saveKeyBtn">Salva</button>
    </div>
    <p class="api-hint">Necessaria per trascrizione e AI. Ottienila su <a href="https://console.groq.com/keys" target="_blank">Groq Console</a>.</p>
  </div>

  <div class="mode-switcher">
    <button class="mode-btn active">Annotazioni</button>
    <a class="mode-btn" href="diary.html">Diario</a>
  </div>

  <div class="meter-section" id="meterSection" style="display:none">
    <div class="meter-row">
      <span class="meter-label">Input Audio</span>
      <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
      <span class="quality-badge" id="qualityBadge">—</span>
    </div>
  </div>

  <div class="box-label">
    <span class="live-dot" id="liveDot"></span>
    Contenuto nota
    <div class="processing-pill" id="processingPill"><span class="pill-dot"></span> trascrivo</div>
  </div>

  <div class="annot-wrap" id="annotWrap">
    <div class="annot-editor" id="annotEditor" contenteditable="true" spellcheck="true" data-placeholder="Inizia a parlare o scrivi qui i tuoi pensieri..."></div>
    
    <div class="fmt-toolbar">
      <button class="fmt-btn" id="aFmtH1">H1</button>
      <button class="fmt-btn" id="aFmtH2">H2</button>
      <button class="fmt-btn" id="aFmtH3">H3</button>
      <button class="fmt-btn" id="aFmtBold"><b>B</b></button>
      <button class="fmt-btn" id="aFmtItalic"><i>I</i></button>
    </div>

    <div class="annot-footer">
      <span class="word-count" id="wordCount">0 parole</span>
      <div class="action-btns">
        <button class="btn-ghost" id="clearBtn" disabled>Pulisci</button>
        <button class="btn-ghost" id="copyBtn" disabled>Copia</button>
        <button class="btn-save-direct" id="saveDirectBtn" disabled>Salva nel Diario</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="timer" id="timer">00:00</div>
    <div class="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <button class="mic-btn" id="micBtn">
      <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <svg id="stopIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
    <div class="status-row">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Inserisci la chiave API</span>
    </div>
  </div>

  <button class="btn-ai" id="aiBtn">✨ Rielabora con AI</button>

  <div class="output-box" id="outputBox">
    <div class="output-overlay" id="outputOverlay">
      <div class="spinner"></div>
      <span class="overlay-text" id="overlayText">AI sta elaborando...</span>
    </div>
    <div class="box-label" id="outputLabel" style="display:none">
      <span class="live-dot" id="outputDot"></span>
      <span id="outputLabelText">Elaborazione AI</span>
    </div>
    <div class="output-text" id="outputText" contenteditable="true"></div>
    <div class="mood-box" id="moodBox">
      <div class="mood-label">Mood & Tono</div>
      <div class="mood-text" id="moodText"></div>
    </div>
    <div class="output-actions" id="outputActions">
      <button class="btn-ghost" id="copyOutputBtn">Copia nota</button>
      <button class="btn-save-diary" id="saveDiaryBtn">Salva nel Diario</button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="saveModal">
  <div class="modal-card">
    <div class="modal-title" id="modalTitle">Salva nel Diario</div>
    <div class="modal-field">
      <label class="modal-label">Titolo</label>
      <input type="text" class="modal-input" id="modalTitleInput" placeholder="Titolo della nota...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Data</label>
      <input type="date" class="modal-input" id="modalDateInput">
    </div>
    <div class="modal-field">
      <label class="modal-label">Anteprima</label>
      <div class="modal-preview" id="modalPreview"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="modalCancel">Annulla</button>
      <button class="modal-btn modal-btn-confirm" id="modalConfirm">Conferma e Salva</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
let GROQ_KEY = localStorage.getItem('vv_groq') || '';
const CHUNK_MS       = 13000; // Ridotto a 13 secondi
const OVERLAP_MS     = 3000;
const MIN_BLOB_BYTES = 12000;
const MAX_BLOB_BYTES = 8 * 1024 * 1024;
const SILENCE_THR    = 0.007;
const SPEECH_RATIO   = 0.12;
const METER_MS       = 80;
const MIN_WORDS_AI   = 10;

// ── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ezycobgovadcgvnyqcew.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ASHxxToKJyMy4CpBAqseqA_mepXAAJ-';
let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

// ── STATE ────────────────────────────────────────────────────────────────────
let isRecording = false, wakeLock = null;
let mediaRecorder = null, activeStream = null;
let chunkTimer = null, timerInterval = null, meterInterval = null;
let seconds = 0;
let pendingChunks = [], isTranscribing = false, isSummarizing = false;
let audioCtx = null, analyser = null, adaptiveGainNode = null;
let apiWarmedUp = false;
let rnnoiseModule = null, rnnoiseState = null;
const analyserBuf = new Float32Array(2048);
let _hasRec = false, _hasWrite = false;

// ── API KEY ───────────────────────────────────────────────────────────────────
function applyKey(k) {
  GROQ_KEY = k.trim();
  if (GROQ_KEY) {
    apiDot.className='dot ok'; apiLabel.textContent='Chiave Groq salvata';
    apiCard.classList.add('ok'); setStatus('idle','Pronto');
  } else {
    apiDot.className='dot'; apiLabel.textContent='Chiave Groq richiesta';
    apiCard.classList.remove('ok'); setStatus('idle','Inserisci la chiave API');
  }
}
if (GROQ_KEY) { apiKeyInput.value=GROQ_KEY; applyKey(GROQ_KEY); }
saveKeyBtn.onclick = () => {
  const k = apiKeyInput.value.trim();
  if (!k) { showErr('Incolla la chiave Groq.'); return; }
  localStorage.setItem('vv_groq',k); applyKey(k); hideErr();
};

// ── EDITOR & FORMATTING ───────────────────────────────────────────────────
annotEditor.addEventListener('input', () => { _hasWrite=true; updateWords(); });
function getEditorText() { return annotEditor.innerText.trim(); }
function updateWords() {
  const n = getEditorText() ? getEditorText().split(/\s+/).filter(Boolean).length : 0;
  wordCount.textContent = n + (n===1?' parola':' parole');
  copyBtn.disabled = n===0;
  clearBtn.disabled = n===0;
  saveDirectBtn.disabled = n===0;
  aiBtn.style.display = n >= MIN_WORDS_AI ? 'block' : 'none';
}

function applyMarkdown(prefix, suffix = prefix) {
  annotEditor.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const selectedText = range.toString();
  
  if (selectedText) {
    const newText = prefix + selectedText + suffix;
    document.execCommand('insertText', false, newText);
  } else {
    document.execCommand('insertText', false, prefix + suffix);
    const newRange = document.createRange();
    newRange.setStart(sel.anchorNode, sel.anchorOffset - suffix.length);
    newRange.setEnd(sel.anchorNode, sel.anchorOffset - suffix.length);
    sel.removeAllRanges();
    sel.addRange(newRange);
  }
}

$('aFmtH1').onclick = () => applyMarkdown('# ');
$('aFmtH2').onclick = () => applyMarkdown('## ');
$('aFmtH3').onclick = () => applyMarkdown('### ');
$('aFmtBold').onclick = () => applyMarkdown('**');
$('aFmtItalic').onclick = () => applyMarkdown('*');

// ── SAVE NOTE ───────────────────────────────────────────────────────────────
let _saveMode = 'direct';
async function openSaveModal(mode) {
  _saveMode = mode;
  const content = mode === 'ai' ? outputText.innerText.trim() : getEditorText();
  if (!content) return;

  const today = new Date();
  modalDateInput.value = today.toISOString().split('T')[0];
  modalTitleInput.value = '';
  modalPreview.innerText = content.substring(0, 200) + '...';
  modalConfirm.disabled = true;
  modalTitle.textContent = 'Generazione titolo...';
  saveModal.classList.add('show');

  const plainText = content.slice(0, 500);
  let suggestedTitle = 'Nota del ' + today.toLocaleDateString('it-IT');
  if (GROQ_KEY) {
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST', cache: 'no-store',
        headers: { 'Authorization': 'Bearer ' + GROQ_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 60, temperature: 0.5,
          messages: [{ role: 'system', content: 'Genera un titolo breve (massimo 8 parole) in italiano. Rispondi SOLO con il titolo, senza virgolette, senza punteggiatura finale.' }, { role: 'user', content: plainText }]
        })
      });
      if (res.ok) { const data = await res.json(); const t = data?.choices?.[0]?.message?.content?.trim(); if (t && t.length > 2 && t.length < 100) suggestedTitle = t; }
    } catch (e) { }
  }
  modalTitleInput.value = suggestedTitle;
  modalTitle.textContent = 'Salva nel Diario';
  modalConfirm.disabled = false;
}

modalCancel.onclick = () => saveModal.classList.remove('show');

modalConfirm.onclick = async () => {
  const title = modalTitleInput.value.trim();
  const date = modalDateInput.value;
  const content = _saveMode === 'ai' ? outputText.innerText.trim() : getEditorText();

  if (!title || !content || !sb) return;

  modalConfirm.disabled = true;
  modalConfirm.innerHTML = '<span class="modal-spinner"></span>Salvataggio...';

  const modeTags = [];
  if (_saveMode === 'ai') {
    modeTags.push('AI');
  } else {
    if (_hasRec) modeTags.push('rec');
    if (_hasWrite) modeTags.push('write');
  }
  const mode = modeTags.length ? modeTags.join('+') : 'write';

  try {
    const { error } = await sb.from('notes').insert([{ title, content, mode, note_date: date }]);
    if (error) throw error;
    saveModal.classList.remove('show');
    if (_saveMode === 'direct') {
        annotEditor.innerText = '';
        updateWords();
    } else {
        outputText.innerText = '';
        outputBox.classList.remove('show');
    }
  } catch (e) {
    showErr('Errore: ' + e.message);
  } finally {
    modalConfirm.disabled = false;
    modalConfirm.textContent = 'Conferma e Salva';
  }
};

saveDirectBtn.onclick = () => openSaveModal('direct');
saveDiaryBtn.onclick = () => openSaveModal('ai');

// ── AUDIO ENGINE & RECORDING ──────────────────────────────────────────────────
function doSegment(stream, mime) {
  if (!isRecording) return;
  const chunks=[],rmsVals=[];let rmsInt=null,overlapTimer=null;
  let mr;
  try{const o={audioBitsPerSecond:128000};if(mime)o.mimeType=mime;mr=new MediaRecorder(stream,o);}
  catch(e){try{mr=new MediaRecorder(stream,{audioBitsPerSecond:128000});}catch(e2){mr=new MediaRecorder(stream);}}
  mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
  mr.onstart=()=>{rmsInt=setInterval(()=>rmsVals.push(getRMS()),200);overlapTimer=setTimeout(()=>{if(isRecording)doSegment(stream,mime);},CHUNK_MS-OVERLAP_MS);};
  mr.onstop=async()=>{
    clearInterval(rmsInt);clearTimeout(overlapTimer);if(!chunks.length)return;
    const blob=new Blob(chunks,{type:mr.mimeType||mime||'audio/webm'});
    if(hasSpeech(rmsVals)&&blob.size>=MIN_BLOB_BYTES&&blob.size<=MAX_BLOB_BYTES)pendingChunks.push(blob);
    if(!isTranscribing)drainQueue();
  };
  chunkTimer=setTimeout(()=>{try{if(mr.state==='recording')mr.stop();}catch(e){}},CHUNK_MS);
  try{mr.start(250);}catch(e){}
  mediaRecorder=mr;
}

async function transcribeBlob(blob) {
  if(!GROQ_KEY)return;
  if(rnnoiseModule&&rnnoiseState)blob=await applyRNNoise(blob);
  const mt=blob.type||'',ext=mt.includes('wav')?'wav':mt.includes('ogg')?'ogg':mt.includes('mp4')?'mp4':'webm';
  const form=new FormData();
  form.append('file',blob,'audio.'+ext);
  form.append('model','whisper-large-v3');
  form.append('language','it');
  form.append('response_format','text');
  const ctx=getEditorText().split(/\s+/).slice(-60).join(' ');
  const prompt=ctx?'Trascrivi esattamente le parole dette in italiano. Contesto recente: '+ctx:'Trascrivi esattamente le parole dette in italiano.';
  form.append('prompt',prompt);
  for(let a=1;a<=3;a++){
    try{
      if(a>1)await sleep(Math.min(1000*Math.pow(2,a-1),8000));
      const res=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',cache:'no-store',headers:{'Authorization':'Bearer '+GROQ_KEY},body:form});
      if(res.status===429){const w=parseInt(res.headers.get('retry-after')||'30',10);await sleep(Math.min(w,60)*1000);a--;continue;}
      if(!res.ok)throw new Error('HTTP '+res.status);
      const raw=(await res.text()).trim();
      const txt=raw.replace(/\.{2,}/g,'').replace(/\u2026/g,'').replace(/\s{2,}/g,' ').trim();
      if(txt&&txt!=='[BLANK_AUDIO]'&&txt.length>1){
        const cur=getEditorText();
        const np=deduplicateOverlap(cur,txt);
        if(np){
          _hasRec=true;
          const prefix = cur && !/\s$/.test(annotEditor.innerText) ? ' ' : '';
          document.execCommand('insertText', false, prefix + np);
          updateWords();
          annotEditor.scrollTop = annotEditor.scrollHeight;
        }
      }
      return;
    }catch(e){if(a===3)showErr('Trascrizione: '+e.message);}
  }
}

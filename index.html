// ═══════════════════════════════════════════════════
// SUPABASE HELPERS
// ═══════════════════════════════════════════════════
async function supaFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.message || 'HTTP ' + res.status); }
  return res.status === 204 ? null : res.json();
}

async function dbSaveNote(note) {
  return supaFetch('notes', 'POST', note);
}
async function dbUpdateNote(id, fields) {
  return supaFetch('notes?id=eq.' + id, 'PATCH', fields);
}
async function dbDeleteNote(id) {
  return supaFetch('notes?id=eq.' + id, 'DELETE');
}
async function dbGetNotes(from, to) {
  return supaFetch('notes?note_date=gte.' + from + '&note_date=lte.' + to + '&order=note_date.desc,created_at.desc&select=*');
}
async function dbGetAllNotes() {
  return supaFetch('notes?order=note_date.desc,created_at.desc&select=*');
}

// ═══════════════════════════════════════════════════
// GENERATE TITLE WITH AI
// ═══════════════════════════════════════════════════
async function generateTitle(text) {
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {'Authorization': 'Bearer ' + GROQ_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile', max_tokens: 30, temperature: 0.4,
        messages: [
          {role:'system', content:'Genera un titolo breve (max 8 parole) in italiano per questa nota. Rispondi SOLO con il titolo, niente altro.'},
          {role:'user', content: text.substring(0, 500)}
        ]
      })
    });
    if (!res.ok) return 'Nota del ' + new Date().toLocaleDateString('it-IT');
    const data = await res.json();
    return data?.choices?.[0]?.message?.content?.trim().replace(/^["']|["']$/g,'') || 'Nota del ' + new Date().toLocaleDateString('it-IT');
  } catch(e) {
    return 'Nota del ' + new Date().toLocaleDateString('it-IT');
  }
}

// ═══════════════════════════════════════════════════
// SAVE NOTE FROM APP
// ═══════════════════════════════════════════════════
$('saveNoteBtn').onclick = async () => {
  const btn = $('saveNoteBtn');
  const content_text = outputText.innerText.trim();
  if (!content_text) return;
  btn.textContent = '⏳ Salvataggio…'; btn.disabled = true;
  try {
    const title = await generateTitle(content_text);
    const mode = currentMode === 'rec' ? 'rec' : 'write';
    const today = new Date().toISOString().split('T')[0];
    const saved = await dbSaveNote({ title, content: outputText.innerHTML, mode, note_date: today });
    btn.textContent = '✓ Salvato!';
    setTimeout(() => { btn.textContent = '💾 Salva nel diario'; btn.disabled = false; }, 2000);
    // Apri subito l'editor per permettere di modificare titolo/data
    openNoteEditor(saved[0]);
  } catch(e) {
    btn.textContent = '💾 Salva nel diario'; btn.disabled = false;
    showErr('Errore salvataggio: ' + e.message);
  }
};

// ═══════════════════════════════════════════════════
// DIARY OVERLAY
// ═══════════════════════════════════════════════════
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = null;

$('diaryBtn').onclick = () => openDiary();
$('diaryClose').onclick = () => $('diaryOverlay').classList.remove('open');
$('calViewBtn').onclick = () => { diaryView='calendar'; $('calViewBtn').classList.add('active'); $('listViewBtn').classList.remove('active'); renderDiary(); };
$('listViewBtn').onclick = () => { diaryView='list'; $('listViewBtn').classList.add('active'); $('calViewBtn').classList.remove('active'); renderDiary(); };

async function openDiary() {
  $('diaryOverlay').classList.add('open');
  diaryNotes = await dbGetAllNotes().catch(()=>[]);
  renderDiary();
}

function renderDiary() {
  if (diaryView === 'calendar') renderCalendar();
  else renderList();
}

// ── CALENDAR ──────────────────────────────────────
function renderCalendar() {
  const body = $('diaryBody');
  const daysWithNotes = new Set(diaryNotes.map(n => n.note_date));
  const months = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const today = new Date().toISOString().split('T')[0];
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Monday=0
  const dows = ['L','M','M','G','V','S','D'];

  let html = '<div class="cal-nav">';
  html += '<button class="cal-nav-btn" id="calPrev">‹</button>';
  html += '<span class="cal-month">' + months[calMonth] + ' ' + calYear + '</span>';
  html += '<button class="cal-nav-btn" id="calNext">›</button>';
  html += '</div><div class="cal-grid">';
  dows.forEach(d => html += '<div class="cal-dow">' + d + '</div>');
  // Empty cells before first day
  for (let i = 0; i < startDow; i++) html += '<div class="cal-day other-month"></div>';
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    let cls = 'cal-day';
    if (daysWithNotes.has(dateStr)) cls += ' has-note';
    if (dateStr === today) cls += ' today';
    if (dateStr === selectedDate) cls += ' selected';
    html += '<div class="' + cls + '" data-date="' + dateStr + '">' + d + '</div>';
  }
  html += '</div>';

  // Notes for selected date
  if (selectedDate) {
    const dayNotes = diaryNotes.filter(n => n.note_date === selectedDate);
    if (dayNotes.length) {
      html += '<div style="margin-top:1rem">';
      dayNotes.forEach(n => {
        html += '<div class="list-note" data-id="' + n.id + '">';
        html += '<div class="list-note-date">' + formatDate(n.note_date) + '<span class="list-note-mode">' + (n.mode==='rec'?'🎙 REC':'✏️ Scrittura') + '</span></div>';
        html += '<div class="list-note-title">' + esc(n.title) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<p style="text-align:center;color:var(--muted);font-size:.7rem;margin-top:1rem">Nessuna nota in questa data</p>';
    }
  }

  body.innerHTML = html;
  $('calPrev').onclick = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  $('calNext').onclick = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };
  body.querySelectorAll('.cal-day[data-date]').forEach(el => {
    el.onclick = () => { selectedDate = el.dataset.date; renderCalendar(); };
  });
  body.querySelectorAll('.list-note[data-id]').forEach(el => {
    el.onclick = () => { const n = diaryNotes.find(x=>x.id===el.dataset.id); if(n) openNoteEditor(n); };
  });
}

// ── LIST ──────────────────────────────────────────
function renderList() {
  const body = $('diaryBody');
  if (!diaryNotes.length) { body.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:.7rem;margin-top:2rem">Nessuna nota salvata</p>'; return; }
  // Group by week
  const weeks = {};
  diaryNotes.forEach(n => {
    const wk = getWeekLabel(n.note_date);
    if (!weeks[wk]) weeks[wk] = [];
    weeks[wk].push(n);
  });
  let html = '';
  Object.entries(weeks).forEach(([wk, notes]) => {
    html += '<div class="list-week">' + wk + '</div>';
    notes.forEach(n => {
      html += '<div class="list-note" data-id="' + n.id + '">';
      html += '<div class="list-note-date">' + formatDate(n.note_date) + '<span class="list-note-mode">' + (n.mode==='rec'?'🎙 REC':'✏️ Scrittura') + '</span></div>';
      html += '<div class="list-note-title">' + esc(n.title) + '</div>';
      html += '</div>';
    });
  });
  body.innerHTML = html;
  body.querySelectorAll('.list-note[data-id]').forEach(el => {
    el.onclick = () => { const n = diaryNotes.find(x=>x.id===el.dataset.id); if(n) openNoteEditor(n); };
  });
}

// ── NOTE EDITOR ───────────────────────────────────
let editingNote = null;

function openNoteEditor(note) {
  editingNote = note;
  $('noteTitleInput').value = note.title || '';
  $('noteDateInput').value = note.note_date || new Date().toISOString().split('T')[0];
  $('noteContentEdit').innerHTML = note.content || '';
  $('noteStatus').textContent = '';
  $('noteOverlay').classList.add('open');
}

$('noteBack').onclick = () => {
  $('noteOverlay').classList.remove('open');
  editingNote = null;
};

$('noteSaveBtn').onclick = async () => {
  if (!editingNote) return;
  const btn = $('noteSaveBtn');
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    const fields = {
      title: $('noteTitleInput').value.trim() || 'Senza titolo',
      note_date: $('noteDateInput').value,
      content: $('noteContentEdit').innerHTML,
      updated_at: new Date().toISOString()
    };
    await dbUpdateNote(editingNote.id, fields);
    Object.assign(editingNote, fields);
    // Aggiorna cache locale
    const idx = diaryNotes.findIndex(n => n.id === editingNote.id);
    if (idx >= 0) diaryNotes[idx] = {...diaryNotes[idx], ...fields};
    $('noteStatus').textContent = 'Salvato ✓';
    btn.textContent = 'Salva'; btn.disabled = false;
  } catch(e) {
    $('noteStatus').textContent = 'Errore: ' + e.message;
    btn.textContent = 'Salva'; btn.disabled = false;
  }
};

$('noteDelete').onclick = async () => {
  if (!editingNote) return;
  if (!confirm('Eliminare questa nota?')) return;
  try {
    await dbDeleteNote(editingNote.id);
    diaryNotes = diaryNotes.filter(n => n.id !== editingNote.id);
    $('noteOverlay').classList.remove('open');
    editingNote = null;
    renderDiary();
  } catch(e) {
    $('noteStatus').textContent = 'Errore: ' + e.message;
  }
};

// ── DATE UTILS ────────────────────────────────────
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
function getWeekLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay() || 7;
  const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString('it-IT', {day:'numeric', month:'short'});
  return fmt(mon) + ' — ' + fmt(sun);
}

<body>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
let GROQ_KEY = localStorage.getItem('vv_groq') || '';
const SUPA_URL = 'https://ezycobgovadcgvnyqcew.supabase.co';
const SUPA_KEY = 'sb_publishable_ASHxxToKJyMy4CpBAqseqA_mepXAAJ-';
const CHUNK_MS        = 10000;
const OVERLAP_MS      = 3000;
const MIN_BLOB_BYTES  = 8000;
const MAX_BLOB_BYTES  = 8 * 1024 * 1024;
const SILENCE_THR     = 0.007;
const SPEECH_RATIO    = 0.12;
const METER_MS        = 80;
const MIN_WORDS_WRITE = 40;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let isRecording = false, wakeLock = null;
let mediaRecorder = null, activeStream = null;
let chunkTimer = null, timerInterval = null, meterInterval = null;
let seconds = 0, allText = '';
let pendingChunks = [], isTranscribing = false, isSummarizing = false;
let audioCtx = null, analyser = null, adaptiveGainNode = null;
let apiWarmedUp = false, currentMode = 'rec';
let diaryView = 'calendar'; // 'calendar' | 'list'
let diaryNotes = []; // cache locale note
let rnnoiseModule = null, rnnoiseState = null;
const analyserBuf = new Float32Array(2048);

// ═══════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const apiKeyInput=$('apiKeyInput'), saveKeyBtn=$('saveKeyBtn'), apiDot=$('apiDot'), apiLabel=$('apiLabel'), apiCard=$('apiCard');
const micBtn=$('micBtn'), micIcon=$('micIcon'), stopIcon=$('stopIcon');
const timerEl=$('timer'), statusDot=$('statusDot'), statusText=$('statusText');
const transcriptBox=$('transcriptBox'), placeholder=$('placeholder'), liveText=$('liveText');
const processingPill=$('processingPill'), liveDot=$('liveDot');
const outputBox=$('outputBox'), outputOverlay=$('outputOverlay'), outputText=$('outputText');
const outputLabel=$('outputLabel'), outputDot=$('outputDot'), outputLabelText=$('outputLabelText');
const overlayText=$('overlayText'), outputActions=$('outputActions'), copyOutputLabel=$('copyOutputLabel');
const errorMsg=$('errorMsg'), wordCount=$('wordCount');
const copyBtn=$('copyBtn'), summaryBtn=$('summaryBtn'), clearBtn=$('clearBtn');
const copyOutputBtn=$('copyOutputBtn');
const meterFill=$('meterFill'), qualityBadge=$('qualityBadge'), meterSection=$('meterSection');
const modeRec=$('modeRec'), modeWrite=$('modeWrite'), recPanel=$('recPanel'), writePanel=$('writePanel');
const modeBadge=$('modeBadge'), writeTextarea=$('writeTextarea'), writeCount=$('writeCount'), improveBtn=$('improveBtn');

// ═══════════════════════════════════════════════════
// API KEY
// ═══════════════════════════════════════════════════
function applyKey(k) {
  GROQ_KEY = k.trim();
  if (GROQ_KEY) {
    apiDot.className='dot ok'; apiLabel.textContent='Chiave Groq salvata ✓';
    apiCard.classList.add('ok'); setStatus('idle','Pronto');
  } else {
    apiDot.className='dot'; apiLabel.textContent='Chiave Groq richiesta';
    apiCard.classList.remove('ok'); setStatus('idle','Inserisci la chiave API');
  }
}
if (GROQ_KEY) { apiKeyInput.value=GROQ_KEY; applyKey(GROQ_KEY); }
saveKeyBtn.onclick = () => {
  const k = apiKeyInput.value.trim();
  if (!k) { showErr('Incolla la chiave Groq.'); return; }
  localStorage.setItem('vv_groq',k); applyKey(k); hideErr();
};

// ═══════════════════════════════════════════════════
// MODE SWITCHER
// ═══════════════════════════════════════════════════
modeRec.onclick  = () => switchMode('rec');
modeWrite.onclick = () => switchMode('write');
function switchMode(mode) {
  if (isRecording) return;
  currentMode = mode;
  if (mode === 'rec') {
    modeRec.classList.add('active'); modeWrite.classList.remove('active');
    recPanel.style.display=''; writePanel.style.display='none';
    modeBadge.textContent='REC';
  } else {
    modeWrite.classList.add('active'); modeRec.classList.remove('active');
    recPanel.style.display='none'; writePanel.style.display='';
    modeBadge.textContent='SCRITTURA';
  }
  outputBox.className='output-box'; outputLabel.style.display='none';
  outputText.innerHTML=''; outputActions.style.display='none'; hideErr();
}

// ═══════════════════════════════════════════════════
// WRITE MODE
// ═══════════════════════════════════════════════════
writeTextarea.addEventListener('input', () => {
  const words = writeTextarea.value.trim().split(/\s+/).filter(Boolean);
  const n = words.length;
  if (n >= MIN_WORDS_WRITE) {
    writeCount.innerHTML = n + ' parole';
    improveBtn.classList.add('show');
  } else {
    writeCount.innerHTML = n + ' parole &mdash; minimo 40 parole per utilizzare AI';
    improveBtn.classList.remove('show');
  }
});

improveBtn.onclick = async () => {
  const txt = writeTextarea.value.trim();
  if (!txt || !GROQ_KEY) { showErr('Inserisci la chiave Groq e del testo.'); return; }
  if (isSummarizing) return;
  isSummarizing = true; improveBtn.disabled = true;
  outputLabelText.textContent='Testo migliorato'; copyOutputLabel.textContent='testo AI';
  overlayText.textContent='AI sta migliorando il testo…';
  outputLabel.style.display='flex'; outputDot.className='live-dot processing';
  outputBox.className='output-box show loading'; outputOverlay.classList.add('show');
  outputActions.style.display='none';
  for (let a=1; a<=3; a++) {
    try {
      if (a>1) await sleep(Math.min(1000*Math.pow(2,a-1),8000));
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':'Bearer '+GROQ_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'llama-3.3-70b-versatile', max_tokens:2048, temperature:0.4,
          messages:[
            {role:'system',content:'Sei un editor professionale italiano. Ricevi un testo che può provenire da una trascrizione audio automatica o da appunti grezzi — può contenere errori, frasi incomplete, punteggiatura mancante o parole mal trascritte. Il tuo compito: inferisci il senso corretto dove il testo è ambiguo, correggi silenziosamente gli errori evidenti, poi organizza in paragrafi con titoli <h3> e sottotitoli <h4> raggruppando gli argomenti per tema. Mantieni tutte le informazioni originali senza inventare. Rispondi SOLO con HTML (usa <p>, <h3>, <h4>, <ul>, <li>). Niente commenti o spiegazioni.'},
            {role:'user',content:'Migliora questo testo:\n\n'+txt}
          ]
        })
      });
      if (res.status===429){const w=parseInt(res.headers.get('retry-after')||'10',10);await waitWithCountdown(Math.min(w,30),'Rate limit — riprovo tra');a--;continue;}
      if (!res.ok){const e=await res.json().catch(()=>{});throw new Error(e?.error?.message||'HTTP '+res.status);}
      const data=await res.json();
      outputText.innerHTML=data?.choices?.[0]?.message?.content?.trim()||'<p>Nessun risultato.</p>';
      outputBox.classList.remove('loading'); outputBox.classList.add('done');
      outputDot.className='live-dot done'; outputOverlay.classList.remove('show');
      outputActions.style.display='flex';
      copyOutputBtn.onclick=()=>doCopy(htmlToMarkdown(outputText.innerHTML),copyOutputBtn,'Copia testo AI');
      isSummarizing=false; improveBtn.disabled=false; return;
    } catch(e) {
      if (a===3){outputText.innerHTML='<p>Errore. Riprova.</p>';showErr('Errore: '+e.message);outputBox.classList.remove('loading');outputOverlay.classList.remove('show');isSummarizing=false;improveBtn.disabled=false;}
    }
  }
};

// ═══════════════════════════════════════════════════
// AUDIO ENGINE — sincrono, nessun worklet
// ═══════════════════════════════════════════════════
function getRMS() {
  if (!analyser) return 0;
  analyser.getFloatTimeDomainData(analyserBuf);
  let s=0; for(let i=0;i<analyserBuf.length;i++) s+=analyserBuf[i]*analyserBuf[i];
  return Math.sqrt(s/analyserBuf.length);
}
function hasSpeech(arr) {
  return arr.length>0 && arr.filter(v=>v>SILENCE_THR).length/arr.length>SPEECH_RATIO;
}
function startMeter() {
  meterSection.style.display='block';
  meterInterval = setInterval(()=>{
    const rms=getRMS(), pct=Math.min(100,rms*600);
    meterFill.style.width=pct+'%';
    if (pct<15)      {meterFill.className='meter-fill';qualityBadge.textContent='Basso';qualityBadge.className='quality-badge low';}
    else if (pct<55) {meterFill.className='meter-fill';qualityBadge.textContent='Buono';qualityBadge.className='quality-badge good';}
    else if (pct<80) {meterFill.className='meter-fill warn';qualityBadge.textContent='Alto';qualityBadge.className='quality-badge ok';}
    else             {meterFill.className='meter-fill loud';qualityBadge.textContent='Saturo';qualityBadge.className='quality-badge low';}
    if (adaptiveGainNode && audioCtx) {
      const t=rms<0.02?2.5:rms<0.05?1.8:rms<0.12?1.4:1.0;
      adaptiveGainNode.gain.setTargetAtTime(t,audioCtx.currentTime,0.3);
    }
  }, METER_MS);
}
function stopMeter() {
  clearInterval(meterInterval);
  meterFill.style.width='0%'; qualityBadge.textContent='—';
  qualityBadge.className='quality-badge'; meterSection.style.display='none';
}
// Inizializza RNNoise (chiamata una volta sola)
async function initRNNoise() {
  if (rnnoiseModule) return true;
  try {
    if (typeof createRNNWasmModule === 'undefined') return false;
    rnnoiseModule = await createRNNWasmModule();
    rnnoiseState = rnnoiseModule._rnnoise_create(0);
    return true;
  } catch(e) { return false; }
}

function buildAudioChain(stream) {
  audioCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
  const src = audioCtx.createMediaStreamSource(stream);
  const hpf = audioCtx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=80; hpf.Q.value=0.7;
  const lpf = audioCtx.createBiquadFilter(); lpf.type='lowpass';  lpf.frequency.value=4000; lpf.Q.value=0.7;
  const comp = audioCtx.createDynamicsCompressor();
  comp.threshold.value=-20; comp.knee.value=8; comp.ratio.value=8; comp.attack.value=0.002; comp.release.value=0.2;
  const gain = audioCtx.createGain(); gain.gain.value=1.6; adaptiveGainNode=gain;
  analyser = audioCtx.createAnalyser(); analyser.fftSize=2048; analyser.smoothingTimeConstant=0.6;
  src.connect(hpf); hpf.connect(lpf); lpf.connect(comp); comp.connect(gain); gain.connect(analyser);
  const silOsc=audioCtx.createOscillator(); const silGain=audioCtx.createGain(); silGain.gain.value=0.00001;
  silOsc.connect(silGain); silGain.connect(audioCtx.destination); silOsc.start();
}

// ═══════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release',()=>{ if(isRecording) setTimeout(acquireWakeLock,300); });
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
// WARMUP
// ═══════════════════════════════════════════════════
async function warmupAPI() {
  const makeWav=()=>{
    const sr=16000,n=sr*0.5,buf=new ArrayBuffer(44+n*2),v=new DataView(buf);
    const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
    ws(0,'RIFF');v.setUint32(4,36+n*2,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);
    v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);
    v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,n*2,true);
    return new Blob([buf],{type:'audio/wav'});
  };
  for(let a=1;a<=2;a++){
    try{
      const form=new FormData();
      form.append('file',makeWav(),'warmup.wav');
      form.append('model','whisper-large-v3-turbo');
      form.append('language','it');
      form.append('response_format','text');
      const res=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{
        method:'POST',headers:{'Authorization':'Bearer '+GROQ_KEY},body:form,
        signal:AbortSignal.timeout(10000)
      });
      if(res.ok||res.status===400) return;
      if(res.status===429){const w=parseInt(res.headers.get('retry-after')||'10',10);await sleep(Math.min(w,15)*1000);}
    }catch(e){if(a===1)await sleep(1000);}
  }
}

// ═══════════════════════════════════════════════════
// RECORDING
// ═══════════════════════════════════════════════════
async function startRec() {
  hideErr();
  if (!GROQ_KEY){showErr('Inserisci prima la chiave Groq API.');return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,sampleRate:48000,channelCount:1}});}
  catch(e){showErr('Microfono: '+e.message);return;}

  activeStream=stream;
  buildAudioChain(stream); // sincrono
  initRNNoise(); // avvia in background, non blocca

  const mimes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4',''];
  const bestMime=mimes.find(m=>!m||MediaRecorder.isTypeSupported(m));

  allText=''; pendingChunks=[];
  liveText.innerHTML=''; outputText.innerHTML='';
  placeholder.style.display='';
  outputBox.className='output-box'; outputLabel.style.display='none'; outputActions.style.display='none';
  summaryBtn.classList.remove('show');
  isRecording=true;

  await acquireWakeLock();
  startMeter();
  document.addEventListener('visibilitychange',onVisibilityChange);

  micBtn.classList.add('recording'); micIcon.style.display='none'; stopIcon.style.display='block';
  transcriptBox.classList.add('recording'); liveDot.classList.add('on');
  setWave(true); startTimer(); placeholder.style.display='none'; renderText(true);
  notifyStart();

  // Warmup bloccante
  if(!apiWarmedUp){
    setStatus('processing','Connessione a Groq…');
    await warmupAPI(); apiWarmedUp=true;
  }
  setStatus('live','In ascolto…');
  doSegment(stream,bestMime);
}

function doSegment(stream,mime){
  if(!isRecording)return;
  const chunks=[],rmsVals=[];let rmsInt=null,overlapTimer=null;
  let mr;
  try{const o={audioBitsPerSecond:128000};if(mime)o.mimeType=mime;mr=new MediaRecorder(stream,o);}
  catch(e){try{mr=new MediaRecorder(stream,{audioBitsPerSecond:128000});}catch(e2){mr=new MediaRecorder(stream);}}
  mediaRecorder=mr;
  mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
  mr.onstart=()=>{
    rmsInt=setInterval(()=>rmsVals.push(getRMS()),200);
    overlapTimer=setTimeout(()=>{if(isRecording)doSegment(stream,mime);},CHUNK_MS-OVERLAP_MS);
  };
  mr.onstop=()=>{
    clearInterval(rmsInt);
    if(!chunks.length)return;
    const mt=mr.mimeType||mime||'audio/webm';
    const blob=new Blob(chunks,{type:mt});
    if(blob.size>=MIN_BLOB_BYTES&&blob.size<=MAX_BLOB_BYTES&&hasSpeech(rmsVals)){pendingChunks.push(blob);processQueue();}
  };
  mr.onerror=()=>{clearInterval(rmsInt);clearTimeout(overlapTimer);if(isRecording)setTimeout(()=>doSegment(stream,mime),500);};
  try{mr.start();}catch(e){if(isRecording)setTimeout(()=>doSegment(stream,mime),500);return;}
  chunkTimer=setTimeout(()=>{try{if(mr.state==='recording')mr.stop();}catch(e){}},CHUNK_MS);
}

async function stopRec(){
  if(!isRecording)return;
  isRecording=false; clearTimeout(chunkTimer);
  document.removeEventListener('visibilitychange',onVisibilityChange);
  try{if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();}catch(e){}
  if(activeStream){activeStream.getTracks().forEach(t=>t.stop());activeStream=null;}
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;analyser=null;adaptiveGainNode=null;}
  if(wakeLock){try{await wakeLock.release();}catch(e){}wakeLock=null;}
  stopMeter();
  micBtn.classList.remove('recording'); micIcon.style.display='block'; stopIcon.style.display='none';
  transcriptBox.classList.remove('recording'); liveDot.className='live-dot done';
  setWave(false); stopTimer(); renderText(false);
  setStatus('processing','Elaborazione…'); notifyStop();
  await sleep(800);
  while(pendingChunks.length>0){
    isTranscribing=true;
    while(pendingChunks.length) await transcribeBlob(pendingChunks.shift());
    isTranscribing=false;
    await sleep(300);
  }
  if(allText.trim()){
    setStatus('done','Completato ✓');
    transcriptBox.classList.add('done');
    copyBtn.disabled=false; clearBtn.disabled=false;
    summaryBtn.classList.add('show');
  } else {
    setStatus('idle','Pronto');
  }
}

function onVisibilityChange(){
  if(document.visibilityState==='visible'&&isRecording){
    acquireWakeLock();
    if(mediaRecorder&&mediaRecorder.state==='inactive')doSegment(activeStream,'');
  }
}
micBtn.onclick=()=>isRecording?stopRec():startRec();
summaryBtn.onclick=()=>{
  if(!allText.trim()||isSummarizing)return;
  summaryBtn.classList.remove('show');
  generateSummary();
};

// ═══════════════════════════════════════════════════
// QUEUE & TRANSCRIPTION
// ═══════════════════════════════════════════════════
async function processQueue(){
  if(isTranscribing||!pendingChunks.length)return;
  isTranscribing=true; processingPill.classList.add('show');
  while(pendingChunks.length) await transcribeBlob(pendingChunks.shift());
  isTranscribing=false; processingPill.classList.remove('show');
}
function deduplicateOverlap(existing,newText){
  if(!existing||!newText)return newText;
  const ew=existing.trim().split(/\s+/),nw=newText.trim().split(/\s+/);
  const max=Math.min(15,ew.length,nw.length);
  for(let l=max;l>=3;l--){
    if(ew.slice(-l).join(' ').toLowerCase()===nw.slice(0,l).join(' ').toLowerCase()){
      const r=nw.slice(l).join(' ').trim(); return r.length>2?r:null;
    }
  }
  return newText;
}
async function applyRNNoise(blob) {
  // Post-process blob with RNNoise before sending to Whisper
  // Works at 48kHz, 480-sample frames (10ms)
  if (!rnnoiseModule || !rnnoiseState) return blob;
  try {
    const arrayBuf = await blob.arrayBuffer();
    const decodeCtx = new OfflineAudioContext(1, 1, 48000);
    const decoded = await decodeCtx.decodeAudioData(arrayBuf);
    const samples = decoded.getChannelData(0);
    const frameSize = 480;
    const framePtr = rnnoiseModule._malloc(frameSize * 4);
    const outSamples = new Float32Array(samples.length);
    for (let i = 0; i < samples.length; i += frameSize) {
      const frame = new Float32Array(frameSize);
      frame.set(samples.slice(i, i + frameSize));
      // RNNoise expects Int16 range (-32768 to 32767)
      for (let j = 0; j < frameSize; j++) frame[j] *= 32768;
      rnnoiseModule.HEAPF32.set(frame, framePtr >> 2);
      rnnoiseModule._rnnoise_process_frame(rnnoiseState, framePtr, framePtr);
      const processed = rnnoiseModule.HEAPF32.subarray(framePtr >> 2, (framePtr >> 2) + frameSize);
      for (let j = 0; j < frameSize; j++) outSamples[i + j] = processed[j] / 32768;
    }
    rnnoiseModule._free(framePtr);
    // Re-encode to WAV
    const wavBuf = new ArrayBuffer(44 + outSamples.length * 2);
    const v = new DataView(wavBuf);
    const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o+i, s.charCodeAt(i)); };
    const sr = decoded.sampleRate;
    ws(0,'RIFF'); v.setUint32(4, 36 + outSamples.length*2, true);
    ws(8,'WAVE'); ws(12,'fmt '); v.setUint32(16,16,true);
    v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
    v.setUint16(32,2,true); v.setUint16(34,16,true);
    ws(36,'data'); v.setUint32(40, outSamples.length*2, true);
    for (let i = 0; i < outSamples.length; i++) {
      v.setInt16(44 + i*2, Math.max(-32768, Math.min(32767, outSamples[i] * 32768)), true);
    }
    return new Blob([wavBuf], {type:'audio/wav'});
  } catch(e) {
    return blob; // fallback al blob originale se RNNoise fallisce
  }
}

async function transcribeBlob(blob){
  // Applica RNNoise se disponibile
  if (rnnoiseModule && rnnoiseState) blob = await applyRNNoise(blob);
  const mt=blob.type||'';
  const ext=mt.includes('wav')?'wav':mt.includes('ogg')?'ogg':mt.includes('mp4')?'mp4':'webm';
  const form=new FormData();
  form.append('file',blob,'audio.'+ext);
  form.append('model','whisper-large-v3-turbo');
  form.append('language','it');
  form.append('response_format','text');
  const ctx=allText.trim().split(/\s+/).slice(-80).join(' ');
  form.append('prompt',ctx
    ?'Trascrizione fedele in italiano. Non aggiungere parole non dette. Usa la punteggiatura con criterio: virgola per pause brevi, punto solo per frasi chiaramente concluse, due punti prima di elenchi. Usa i puntini di sospensione SOLO se la frase è interrotta bruscamente, mai alla fine di una frase che potrebbe continuare. Contesto: '+ctx
    :'Trascrizione fedele in italiano. Non aggiungere parole non dette. Usa la punteggiatura con criterio: virgola per pause brevi, punto solo per frasi chiaramente concluse. Usa i puntini di sospensione SOLO se la frase è interrotta bruscamente.');
  for(let a=1;a<=4;a++){
    try{
      if(a>1) await sleep(Math.min(1000*Math.pow(2,a-1),10000));
      const res=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',headers:{'Authorization':'Bearer '+GROQ_KEY},body:form});
      if(res.status===429){
        const w=parseInt(res.headers.get('retry-after')||'60',10);
        const ed=await res.json().catch(()=>({}));
        const m=ed?.error?.message||'';
        const match=m.match(/try again in (\d+)m(\d+)s/)||m.match(/try again in (\d+)s/);
        let ws=w;
        if(match&&match.length===3) ws=parseInt(match[1])*60+parseInt(match[2]);
        else if(match&&match.length===2) ws=parseInt(match[1]);
        await waitWithCountdown(Math.min(ws,300),'Rate limit — riprovo tra'); a--;continue;
      }
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||'HTTP '+res.status);}
      hideErr();
      const raw=(await res.text()).trim();
      const txt=raw.replace(/\.{2,}/g,'').replace(/…/g,'').replace(/\s{2,}/g,' ').trim();
      if(txt&&txt!=='[BLANK_AUDIO]'&&txt.length>1){
        const np=deduplicateOverlap(allText,txt);
        if(np){allText+=(allText?' ':'')+np;updateWords();copyBtn.disabled=false;clearBtn.disabled=false;renderText(isRecording);transcriptBox.scrollTop=transcriptBox.scrollHeight;}
      }
      return;
    }catch(e){if(a===4)showErr('Errore trascrizione: '+e.message);}
  }
}

// ═══════════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════════
async function generateSummary(){
  if(isSummarizing)return;
  isSummarizing=true;
  outputLabelText.textContent='Riassunto'; copyOutputLabel.textContent='riassunto';
  overlayText.textContent='Groq sta riassumendo…';
  outputLabel.style.display='flex'; outputDot.className='live-dot processing';
  outputBox.className='output-box show loading'; outputOverlay.classList.add('show');
  outputActions.style.display='none';
  for(let a=1;a<=3;a++){
    try{
      if(a>1) await sleep(Math.min(1000*Math.pow(2,a-1),8000));
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':'Bearer '+GROQ_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'llama-3.3-70b-versatile',max_tokens:1024,temperature:0.3,
          messages:[
            {role:'system',content:'Sei un editor professionale italiano. Ricevi una trascrizione automatica da audio — il testo può contenere errori, parole mancanti, frasi incomplete o punteggiatura errata. Il tuo compito: inferisci il senso corretto anche dove il testo è ambiguo, correggi silenziosamente gli errori evidenti di trascrizione, poi organizza tutto in un testo strutturato con titoli <h3> e sottotitoli <h4> raggruppando gli argomenti. Scrivi in italiano naturale e corretto. Rispondi SOLO con HTML (usa <p>, <h3>, <h4>, <ul>, <li>). Niente commenti o spiegazioni.'},
            {role:'user',content:'Trascrizione:\n"'+allText+'"'}
          ]
        })
      });
      if(res.status===429){const w=parseInt(res.headers.get('retry-after')||'30',10);await waitWithCountdown(Math.min(w,60),'Rate limit — riprovo tra');a--;continue;}
      if(!res.ok){const e=await res.json().catch(()=>{});throw new Error(e?.error?.message||'HTTP '+res.status);}
      const data=await res.json();
      outputText.innerHTML=data?.choices?.[0]?.message?.content?.trim()||'<p>Nessun riassunto.</p>';
      outputBox.classList.remove('loading'); outputBox.classList.add('done');
      outputDot.className='live-dot done'; outputOverlay.classList.remove('show');
      outputActions.style.display='flex';
      copyOutputBtn.onclick=()=>doCopy(htmlToMarkdown(outputText.innerHTML),copyOutputBtn,'Copia riassunto');
      isSummarizing=false; return;
    }catch(e){
      if(a===3){
        outputText.innerHTML='<p>Riassunto non disponibile. Copia il testo.</p>';
        showErr('Errore riassunto: '+e.message);
        outputBox.classList.remove('loading'); outputOverlay.classList.remove('show');
        isSummarizing=false; summaryBtn.classList.add('show');
      }
    }
  }
}

// ═══════════════════════════════════════════════════
// PWA
// ═══════════════════════════════════════════════════
let swReg=null;
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(r=>{swReg=r;}).catch(()=>{});
  navigator.serviceWorker.addEventListener('message',e=>{if(e.data==='stopFromNotification')stopRec();});
}
function notifyStart(){if(!swReg)return;Notification.requestPermission().then(p=>{if(p==='granted')navigator.serviceWorker.ready.then(r=>r.active.postMessage('startRecording'));});}
function notifyStop(){if(!swReg)return;navigator.serviceWorker.ready.then(r=>r.active.postMessage('stopRecording'));}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function waitWithCountdown(sec,label){for(let i=sec;i>0;i--){showErr('⏳ '+label+' '+i+'s…');await sleep(1000);}hideErr();}
function renderText(cur){liveText.innerHTML=esc(allText)+(cur?'<span class="cursor"></span>':'');}
function startTimer(){seconds=0;clearInterval(timerInterval);timerEl.textContent='00:00';timerInterval=setInterval(()=>{seconds++;timerEl.textContent=fmt(seconds);},1000);}
function stopTimer(){clearInterval(timerInterval);}
function fmt(s){return pad(Math.floor(s/60))+':'+pad(s%60);}
function pad(n){return String(n).padStart(2,'0');}
function setWave(on){document.querySelectorAll('.bar').forEach(b=>on?b.classList.add('active'):b.classList.remove('active'));}
function setStatus(state,text){
  statusDot.className='status-dot';
  if(state==='live')statusDot.classList.add('live');
  else if(state==='processing')statusDot.classList.add('processing');
  else if(state==='done')statusDot.classList.add('done');
  statusText.textContent=text;
}
function showErr(m){errorMsg.textContent=m;errorMsg.classList.add('show');}
function hideErr(){errorMsg.classList.remove('show');}
function updateWords(){const w=allText.trim().split(/\s+/).filter(Boolean);wordCount.textContent=w.length+(w.length===1?' parola':' parole');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function doCopy(txt,btn,lbl){
  const done=()=>{const orig=lbl;btn.textContent='Copiato!';setTimeout(()=>btn.innerHTML=orig,1800);};
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(done).catch(()=>{fb(txt);done();});
  else{fb(txt);done();}
}
function fb(t){const el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}
function htmlToMarkdown(html){
  const d=document.createElement('div'); d.innerHTML=html;
  function w(n){
    if(n.nodeType===3)return n.textContent;
    const t=(n.tagName||'').toLowerCase();
    const c=Array.from(n.childNodes).map(w).join('');
    if(t==='h2')return'## '+c.trim()+'\n\n';
    if(t==='h3')return'### '+c.trim()+'\n\n';
    if(t==='h4')return'#### '+c.trim()+'\n\n';
    if(t==='p')return c.trim()+'\n\n';
    if(t==='ul')return c+'\n';
    if(t==='li')return'- '+c.trim()+'\n';
    if(t==='strong'||t==='b')return'**'+c+'**';
    if(t==='em'||t==='i')return'*'+c+'*';
    if(t==='br')return'\n';
    return c;
  }
  return w(d).replace(/\n{3,}/g,'\n\n').trim();
}
copyBtn.onclick=()=>doCopy(allText,copyBtn,'Copia testo');
clearBtn.onclick=()=>{
  if(isRecording)return;
  allText=''; liveText.innerHTML=''; outputText.innerHTML='';
  placeholder.style.display=''; transcriptBox.className='transcript-box'; liveDot.className='live-dot';
  outputBox.className='output-box'; outputLabel.style.display='none'; outputActions.style.display='none';
  summaryBtn.classList.remove('show');
  timerEl.textContent='00:00'; updateWords();
  copyBtn.disabled=true; clearBtn.disabled=true;
  setStatus('idle','Pronto'); hideErr();
};
